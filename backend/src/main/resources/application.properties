spring.application.name=backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/xydb?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.initialization-fail-timeout=10000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.leak-detection-threshold=15000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai

jwt.secret=${JWT_SECRET:change-me-before-production-min-32-bytes-key}
jwt.expiration-days=7

logging.level.org.springframework=INFO
server.port=8080
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO

# AI provider (primary + backup)
ai.provider.base-url=${AI_PROVIDER_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
ai.provider.model=${AI_PROVIDER_MODEL:qwen2.5-vl-72b-instruct}
ai.provider.api-token=${AI_PROVIDER_API_TOKEN:}
ai.provider.backup.base-url=${AI_PROVIDER_BACKUP_BASE_URL:https://api.deepseek.com/v1}
ai.provider.backup.model=${AI_PROVIDER_BACKUP_MODEL:deepseek-chat}
ai.provider.backup.api-token=${AI_PROVIDER_BACKUP_API_TOKEN:}