<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>铃记 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src='./js/pages/登录页面.inline-01.js?v=20260327_jssplit'></script>
    <script src='./js/tailwind-style-loader.js?v=20260327_csssplit'></script>
  <script src='./js/pages/登录页面.inline-02.js?v=20260327_jssplit'></script>
</head>
  <body class="font-inter min-h-screen flex flex-col overflow-hidden relative">
    <!-- 全屏渐变背景 -->
    <div class="bg-gradient-full"></div>
    
    <!-- ===== 装饰性光斑 - 柔和色调 ===== -->
    <div class="fixed top-20 left-10 w-72 h-72 bg-white/5 rounded-full blur-3xl pointer-events-none orb-float"></div>
    <div class="fixed bottom-20 right-10 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl pointer-events-none orb-float" style="animation-delay: -2s;"></div>
    <div class="fixed top-1/2 left-1/2 w-64 h-64 bg-primary/10 rounded-full blur-3xl pointer-events-none pulse-glow"></div>
    <div class="fixed top-40 right-20 w-48 h-48 bg-secondary/10 rounded-full blur-3xl pointer-events-none orb-float" style="animation-delay: -4s;"></div>
    <div class="fixed bottom-40 left-20 w-56 h-56 bg-secondary/10 rounded-full blur-3xl pointer-events-none orb-float" style="animation-delay: -6s;"></div>
    <div class="fixed top-1/3 left-1/4 w-40 h-40 bg-white/8 rounded-full blur-2xl pointer-events-none orb-float" style="animation-delay: -8s;"></div>
    <div class="fixed bottom-1/3 right-1/4 w-32 h-32 bg-primary/15 rounded-full blur-2xl pointer-events-none pulse-glow" style="animation-delay: -1s;"></div>
    <!-- 新增背景光斑 -->
    <div class="fixed top-0 left-1/2 w-80 h-80 bg-primary/5 rounded-full blur-3xl pointer-events-none orb-float" style="animation-delay: -3s;"></div>
    <div class="fixed bottom-0 left-1/3 w-60 h-60 bg-secondary/8 rounded-full blur-3xl pointer-events-none pulse-glow" style="animation-delay: -5s;"></div>
    
    <!-- ===== 网格背景纹理 ===== -->
    <div class="fixed inset-0 pointer-events-none opacity-5" style="background-image: radial-gradient(circle, rgba(255,255,255,0.3) 1px, transparent 1px); background-size: 30px 30px;"></div>
    
    <!-- ===== 粒子漂浮效果 ===== -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute w-1 h-1 bg-white/40 rounded-full particle-float" style="left: 10%; animation-delay: 0s;"></div>
        <div class="absolute w-1 h-1 bg-white/40 rounded-full particle-float" style="left: 20%; animation-delay: 2s;"></div>
        <div class="absolute w-1 h-1 bg-white/40 rounded-full particle-float" style="left: 30%; animation-delay: 4s;"></div>
        <div class="absolute w-1 h-1 bg-white/40 rounded-full particle-float" style="left: 40%; animation-delay: 6s;"></div>
        <div class="absolute w-1 h-1 bg-white/40 rounded-full particle-float" style="left: 50%; animation-delay: 8s;"></div>
        <div class="absolute w-1 h-1 bg-white/40 rounded-full particle-float" style="left: 60%; animation-delay: 10s;"></div>
        <div class="absolute w-1 h-1 bg-white/40 rounded-full particle-float" style="left: 70%; animation-delay: 12s;"></div>
        <div class="absolute w-1 h-1 bg-white/40 rounded-full particle-float" style="left: 80%; animation-delay: 14s;"></div>
    </div>
    
    <div class="flex-1 flex flex-col md:flex-row relative z-10">
      <!-- 左侧欢迎区域 -->
      <div class="hidden md:flex md:w-1/2 lg:w-5/12 p-8 lg:p-12 pt-14 lg:pt-18 flex-col justify-start items-center text-white">
        <!-- 光晕背景 -->
        <div class="absolute inset-0 glass-strong rounded-3xl -z-10"></div>
        
        <!-- 太阳图标 - 保留弹跳动画 -->
        <div id="hero-theme-icon" class="text-6xl mb-6 icon-bounce">☀️</div>
        
        <!-- 标题 - 取消渐变动画，使用纯色 -->
        <h1 class="text-[clamp(2rem,4vw,3.5rem)] font-bold mb-4 tracking-tight text-white">铃记</h1>
        <p class="text-lg lg:text-xl text-center mb-8 max-w-md text-white/90">专注每一天，高效每一刻</p>
        
        <!-- 应用界面展示 - 轻微倾斜浮动动画 -->
        <div class="relative w-full max-w-md mb-8 group">
          <div class="absolute inset-0 bg-white/10 rounded-2xl blur-xl transform rotate-3 scale-105 group-hover:blur-2xl transition-all duration-500"></div>
          <div class="absolute inset-0 bg-gradient-to-r from-primary/20 to-secondary/20 rounded-2xl blur-lg opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
          <img id="auth-hero-preview" src="assets/ringnote-auth-light.svg" alt="铃记应用界面" class="w-full rounded-2xl shadow-2xl transform hover:scale-[1.02] transition-transform duration-500 relative z-10 image-tilt-float glow-border" />
        </div>
        
        <!-- 用户统计 -->
        <div class="text-center">
          <p class="mb-4 text-sm lg:text-base text-white/80">已有超过 100 万人使用铃记提升效率</p>
          <div class="flex justify-center">
            <div class="flex -space-x-3">
              <img src="https://design.gemcoder.com/staticResource/echoAiSystemImages/5789ae6a9dfaeb368ba279d92fd58c77.png" alt="用户头像" class="w-10 h-10 rounded-full border-2 border-white/50 avatar-float" style="animation-delay: 0s;" />
              <img src="https://design.gemcoder.com/staticResource/echoAiSystemImages/d27cfa0599490bdc19cd197ce549a2cd.png" alt="用户头像" class="w-10 h-10 rounded-full border-2 border-white/50 avatar-float" style="animation-delay: 0.2s;" />
              <img src="https://design.gemcoder.com/staticResource/echoAiSystemImages/ab41ca8361c02f52ff523a0ebeff3591.png" alt="用户头像" class="w-10 h-10 rounded-full border-2 border-white/50 avatar-float" style="animation-delay: 0.4s;" />
              <div class="w-10 h-10 rounded-full border-2 border-white/50 bg-white/20 flex items-center justify-center text-xs font-medium backdrop-blur-sm pulse-glow">+10k</div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- 右侧登录表单区域 -->
      <div class="w-full md:w-1/2 lg:w-7/12 flex items-center justify-center p-6 lg:p-12">
        <div class="w-full max-w-md">
          <!-- 登录卡片 - 优化透明度 -->
          <div class="glass-card rounded-3xl shadow-2xl card-hover p-8 lg:p-10 form-enter">
            <!-- Logo 和标题 (移动端显示) -->
            <div class="md:hidden text-center mb-6">
              <div class="text-4xl mb-3 icon-bounce">☀️</div>
              <h2 class="text-2xl font-bold text-dark mb-1">铃记</h2>
              <p class="text-gray-500 text-sm">专注每一天，高效每一刻</p>
            </div>
            
            <!-- 标题 - 优化层次 -->
            <div class="mb-8 hidden md:block">
              <h2 class="text-3xl font-bold text-gray-800 mb-2">欢迎回来 👋</h2>
              <p class="text-gray-500 text-sm">登录后开启高效的一天</p>
            </div>
            
            <!-- 登录表单 -->
            <form id="login-form" class="space-y-5" action="待办页面.html" method="GET">
              <!-- 账号输入 -->
              <div>
                <label for="login-account" class="block text-sm font-medium text-gray-700 mb-2">手机号/邮箱</label>
                <div class="relative group">
                  <span class="absolute inset-y-0 left-0 flex items-center pl-4 input-icon">
                    <i class="fas fa-user"> </i>
                  </span>
                  <input type="text" id="login-account" class="w-full pl-12 pr-4 py-3.5 border-2 border-gray-200 rounded-xl input-focus glass-input hover:border-gray-300" placeholder="请输入手机号或邮箱" required />
                </div>
              </div>
              
              <!-- 密码输入 -->
              <div>
                <label for="login-password" class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                <div class="relative group">
                  <span class="absolute inset-y-0 left-0 flex items-center pl-4 input-icon">
                    <i class="fas fa-lock"> </i>
                  </span>
                  <input type="password" id="login-password" class="w-full pl-12 pr-12 py-3.5 border-2 border-gray-200 rounded-xl input-focus glass-input hover:border-gray-300" placeholder="请输入密码" required />
                  <button type="button" class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-400 hover:text-primary transition-colors duration-300" id="toggle-password">
                    <i class="fas fa-eye-slash"> </i>
                  </button>
                </div>
              </div>
              
              <!-- 记住我 & 忘记密码 -->
              <div class="flex items-center justify-between">
                <div class="flex items-center group">
                  <input type="checkbox" id="remember-me" class="w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary cursor-pointer" />
                  <label for="remember-me" class="ml-2 text-sm text-gray-600 cursor-pointer group-hover:text-gray-800 transition-colors duration-300">记住我</label>
                </div>
                <a id="forgot-password-link" href="javascript:void(0);" class="text-sm text-primary font-medium hover:text-primary/70 transition-colors duration-300">忘记密码？</a>
              </div>
              
              <!-- 登录按钮 -->
              <button type="submit" class="w-full btn-primary text-base shadow-lg shadow-primary/30 btn-glow">登 录</button>
              
              <!-- 分割线 -->
              <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                  <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center">
                  <span class="auth-alt-divider px-4 bg-white/95 backdrop-blur-sm text-gray-600 text-sm font-medium rounded-full border border-gray-200/80">其他登录方式</span>
                </div>
              </div>
              
              <!-- 社交登录 - 图标 + 文字 -->
              <div class="grid grid-cols-4 gap-3">
                <button type="button" class="btn-social group glass-strong hover:border-green-400/50" title="微信登录">
                  <i class="fab fa-weixin text-green-500 social-icon"> </i>
                  <span class="social-text">微信</span>
                </button>
                <button type="button" class="btn-social group glass-strong hover:border-gray-400/50" title="苹果登录">
                  <i class="fab fa-apple text-gray-800 social-icon"> </i>
                  <span class="social-text">苹果</span>
                </button>
                <button type="button" class="btn-social group glass-strong hover:border-red-400/50" title="谷歌登录">
                  <i class="fab fa-google text-red-500 social-icon"> </i>
                  <span class="social-text">谷歌</span>
                </button>
                <button type="button" class="btn-social group glass-strong hover:border-purple-400/50" title="访客登录">
                  <i class="fas fa-user-secret text-purple-500 social-icon"> </i>
                  <span class="social-text">访客</span>
                </button>
              </div>
              
              <!-- 注册链接 -->
              <div class="text-center mt-6 pt-6 border-t border-gray-100">
                <p class="auth-switch-note text-sm text-gray-700">
                  还没有账号？
                  <a href="注册页面.html" class="text-primary font-semibold hover:text-primary/70 transition-colors duration-300 inline-block hover:scale-105 transform">立即注册</a>
                </p>
              </div>
            </form>
          </div>
          
          <!-- 底部提示 - 提高对比度 -->
          <p class="text-center text-xs text-white/90 mt-6 px-4 leading-relaxed">
            登录即代表您同意我们的
            <a href="javascript:void(0);" class="underline hover:text-white font-medium transition-colors duration-300">用户协议</a>
            和
            <a href="javascript:void(0);" class="underline hover:text-white font-medium transition-colors duration-300">隐私政策</a>
          </p>
        </div>
      </div>
    </div>

    <div id="forgot-password-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
      <div class="w-full max-w-md bg-white/95 rounded-2xl shadow-2xl p-6">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-xl font-bold text-gray-800">找回密码</h3>
          <button id="forgot-password-close" type="button" class="text-gray-400 hover:text-gray-600">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <p class="text-sm text-gray-500 mb-4">请输入注册邮箱并设置新密码。</p>
        <form id="forgot-password-form" class="space-y-3">
          <input id="forgot-email" type="email" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl input-focus" placeholder="注册邮箱" required />
          <input id="forgot-new-password" type="password" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl input-focus" placeholder="新密码（至少6位）" minlength="6" required />
          <input id="forgot-confirm-password" type="password" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl input-focus" placeholder="确认新密码" minlength="6" required />
          <button type="submit" class="w-full btn-primary">确认重置密码</button>
        </form>
      </div>
    </div>
    
    <!-- JavaScript -->
    <script src="data.js"></script>
    <script src="common.js?v=20260401_liquid_modal1"></script>
    <script src="components.js"></script>
    <script src='./js/pages/登录页面.inline-03.js?v=20260327_jssplit'></script>
  </body>
</html>
