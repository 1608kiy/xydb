<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>铃记 - 后台管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link rel='stylesheet' href='./css/后台管理页面.css?v=20260327_csssplit' />
</head>
  <body class="text-slate-100">
    <main class="mx-auto max-w-6xl px-4 py-8 md:px-6 lg:py-12">
      <header class="glass-panel mb-6 rounded-2xl p-5 shadow-2xl">
        <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
          <div>
            <p class="text-xs uppercase tracking-[0.28em] text-cyan-300">ringnote Admin Console</p>
            <h1 class="mt-2 text-3xl font-bold">后台管理中心</h1>
            <p class="mt-1 text-sm text-slate-300">管理员账号可查看并管理平台用户</p>
          </div>
          <div class="flex items-center gap-2">
            <button id="refresh-users" class="rounded-xl bg-cyan-500/85 px-4 py-2 text-sm font-semibold text-slate-900 hover:bg-cyan-400">
              <i class="fas fa-rotate mr-2"></i>刷新列表
            </button>
            <button id="admin-logout" class="rounded-xl bg-rose-500/85 px-4 py-2 text-sm font-semibold hover:bg-rose-400">
              <i class="fas fa-right-from-bracket mr-2"></i>退出登录
            </button>
          </div>
        </div>
      </header>

      <section class="mb-6 grid gap-3 sm:grid-cols-2 lg:grid-cols-4">
        <article class="stat-tile rounded-2xl p-4 shadow-xl">
          <p class="text-xs text-slate-300">总用户数</p>
          <p id="stat-total-users" class="mt-2 text-2xl font-bold text-cyan-300">0</p>
          <p class="mt-1 text-xs text-slate-400">平台账号总量</p>
        </article>
        <article class="stat-tile rounded-2xl p-4 shadow-xl">
          <p class="text-xs text-slate-300">管理员数</p>
          <p id="stat-admin-users" class="mt-2 text-2xl font-bold text-emerald-300">0</p>
          <p class="mt-1 text-xs text-slate-400">系统保留账号</p>
        </article>
        <article class="stat-tile rounded-2xl p-4 shadow-xl">
          <p class="text-xs text-slate-300">普通用户数</p>
          <p id="stat-normal-users" class="mt-2 text-2xl font-bold text-indigo-300">0</p>
          <p class="mt-1 text-xs text-slate-400">可运营管理对象</p>
        </article>
        <article class="stat-tile rounded-2xl p-4 shadow-xl">
          <p class="text-xs text-slate-300">今日新增</p>
          <p id="stat-today-users" class="mt-2 text-2xl font-bold text-amber-300">0</p>
          <p class="mt-1 text-xs text-slate-400">注册趋势观察</p>
        </article>
      </section>

      <section class="glass-panel mb-6 rounded-2xl p-5 shadow-2xl">
        <div class="grid gap-3 md:grid-cols-2 lg:grid-cols-5">
          <label class="lg:col-span-2">
            <span class="mb-1 block text-xs text-slate-300">关键词搜索</span>
            <input id="search-keyword" type="text" placeholder="按昵称/邮箱/手机号搜索" class="w-full rounded-xl border border-slate-600 bg-slate-900/70 px-3 py-2 text-sm text-slate-100 outline-none ring-cyan-400 transition focus:ring" />
          </label>
          <label>
            <span class="mb-1 block text-xs text-slate-300">身份筛选</span>
            <select id="role-filter" class="w-full rounded-xl border border-slate-600 bg-slate-900/70 px-3 py-2 text-sm text-slate-100 outline-none ring-cyan-400 transition focus:ring">
              <option value="all">全部身份</option>
              <option value="admin">仅管理员</option>
              <option value="user">仅普通用户</option>
            </select>
          </label>
          <label>
            <span class="mb-1 block text-xs text-slate-300">等级筛选</span>
            <select id="level-filter" class="w-full rounded-xl border border-slate-600 bg-slate-900/70 px-3 py-2 text-sm text-slate-100 outline-none ring-cyan-400 transition focus:ring">
              <option value="all">全部等级</option>
              <option value="1-10">1 - 10</option>
              <option value="11-50">11 - 50</option>
              <option value="51+">51+</option>
            </select>
          </label>
          <label>
            <span class="mb-1 block text-xs text-slate-300">排序方式</span>
            <select id="sort-by" class="w-full rounded-xl border border-slate-600 bg-slate-900/70 px-3 py-2 text-sm text-slate-100 outline-none ring-cyan-400 transition focus:ring">
              <option value="createdAt_desc">注册时间（新到旧）</option>
              <option value="id_desc">ID（大到小）</option>
              <option value="id_asc">ID（小到大）</option>
              <option value="level_desc">等级（高到低）</option>
              <option value="level_asc">等级（低到高）</option>
              <option value="nickname_asc">昵称（A-Z）</option>
            </select>
          </label>
        </div>
      </section>

      <section class="glass-panel mb-6 rounded-2xl p-5 shadow-2xl">
        <div class="mb-3 flex items-center justify-between">
          <h2 class="text-lg font-semibold">创建管理员账号</h2>
          <p class="text-xs text-slate-400">用于分配后台管理权限</p>
        </div>
        <div class="grid gap-3 md:grid-cols-2 lg:grid-cols-5">
          <label>
            <span class="mb-1 block text-xs text-slate-300">昵称</span>
            <input id="new-admin-nickname" type="text" placeholder="例如：运营管理员" class="w-full rounded-xl border border-slate-600 bg-slate-900/70 px-3 py-2 text-sm text-slate-100 outline-none ring-cyan-400 transition focus:ring" />
          </label>
          <label>
            <span class="mb-1 block text-xs text-slate-300">邮箱</span>
            <input id="new-admin-email" type="email" placeholder="admin2@example.com" class="w-full rounded-xl border border-slate-600 bg-slate-900/70 px-3 py-2 text-sm text-slate-100 outline-none ring-cyan-400 transition focus:ring" />
          </label>
          <label>
            <span class="mb-1 block text-xs text-slate-300">密码</span>
            <input id="new-admin-password" type="password" placeholder="至少 6 位" class="w-full rounded-xl border border-slate-600 bg-slate-900/70 px-3 py-2 text-sm text-slate-100 outline-none ring-cyan-400 transition focus:ring" />
          </label>
          <label>
            <span class="mb-1 block text-xs text-slate-300">手机号</span>
            <input id="new-admin-phone" type="text" placeholder="可选：11位手机号" class="w-full rounded-xl border border-slate-600 bg-slate-900/70 px-3 py-2 text-sm text-slate-100 outline-none ring-cyan-400 transition focus:ring" />
          </label>
          <div class="flex items-end">
            <button id="create-admin-user" class="w-full rounded-xl bg-emerald-500/85 px-4 py-2 text-sm font-semibold text-slate-900 hover:bg-emerald-400">
              <i class="fas fa-user-shield mr-2"></i>创建管理员
            </button>
          </div>
        </div>
      </section>

      <section class="glass-panel rounded-2xl p-5 shadow-2xl">
        <div class="mb-4 flex items-center justify-between">
          <h2 class="text-lg font-semibold">用户管理</h2>
          <div class="flex items-center gap-2">
            <span id="selected-count" class="rounded-full border border-rose-300/40 bg-rose-300/10 px-3 py-1 text-xs text-rose-200">已选 0</span>
            <button id="batch-delete-users" class="rounded-xl bg-rose-500/85 px-3 py-1.5 text-xs font-semibold text-white hover:bg-rose-400 disabled:cursor-not-allowed disabled:opacity-50" disabled>
              <i class="fas fa-trash mr-1"></i>批量删除
            </button>
            <span id="user-count" class="rounded-full border border-cyan-300/40 bg-cyan-300/10 px-3 py-1 text-xs text-cyan-200">总用户 0</span>
          </div>
        </div>

        <div class="overflow-x-auto rounded-xl border border-slate-600/60">
          <table class="min-w-full text-sm">
            <thead class="bg-slate-900/70 text-slate-200">
              <tr>
                <th class="px-4 py-3 text-left">
                  <input id="select-all-users" type="checkbox" class="h-4 w-4 rounded border-slate-500 bg-slate-800" />
                </th>
                <th class="px-4 py-3 text-left">ID</th>
                <th class="px-4 py-3 text-left">昵称</th>
                <th class="px-4 py-3 text-left">邮箱</th>
                <th class="px-4 py-3 text-left">手机号</th>
                <th class="px-4 py-3 text-left">等级</th>
                <th class="px-4 py-3 text-left">身份</th>
                <th class="px-4 py-3 text-left">操作</th>
              </tr>
            </thead>
            <tbody id="users-tbody" class="divide-y divide-slate-700/70 bg-slate-900/35">
              <tr>
                <td colspan="8" class="px-4 py-6 text-center text-slate-300">正在加载用户数据...</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="mt-4 flex flex-col gap-3 border-t border-slate-700/70 pt-4 md:flex-row md:items-center md:justify-between">
          <div class="text-xs text-slate-300">
            <span id="result-summary">显示 0 / 0</span>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <label class="flex items-center gap-2 text-xs text-slate-300">
              每页
              <select id="page-size" class="rounded-lg border border-slate-600 bg-slate-900/70 px-2 py-1 text-xs text-slate-100">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="20">20</option>
                <option value="50">50</option>
              </select>
              条
            </label>
            <button id="prev-page" class="rounded-lg border border-slate-600 bg-slate-800/70 px-3 py-1.5 text-xs text-slate-100 hover:bg-slate-700/80 disabled:cursor-not-allowed disabled:opacity-50" disabled>
              <i class="fas fa-angle-left mr-1"></i>上一页
            </button>
            <span id="page-info" class="px-2 text-xs text-slate-300">第 1 / 1 页</span>
            <button id="next-page" class="rounded-lg border border-slate-600 bg-slate-800/70 px-3 py-1.5 text-xs text-slate-100 hover:bg-slate-700/80 disabled:cursor-not-allowed disabled:opacity-50" disabled>
              下一页<i class="fas fa-angle-right ml-1"></i>
            </button>
          </div>
        </div>
      </section>

      <section class="glass-panel mt-6 rounded-2xl p-5 shadow-2xl">
        <div class="mb-3 flex items-center justify-between">
          <h2 class="text-lg font-semibold">操作日志</h2>
          <button id="clear-logs" class="rounded-lg border border-slate-500/70 bg-slate-800/70 px-3 py-1 text-xs text-slate-200 hover:bg-slate-700/80">清空日志</button>
        </div>
        <div id="ops-logs" class="space-y-2">
          <p class="text-sm text-slate-400">暂无操作日志</p>
        </div>
      </section>
    </main>

    <div id="detail-modal" class="hidden">
      <div id="detail-backdrop" class="modal-backdrop"></div>
      <div class="detail-modal">
        <div class="detail-card glass-panel rounded-2xl p-5 shadow-2xl">
          <div class="mb-4 flex items-start justify-between">
            <div>
              <p class="text-xs uppercase tracking-[0.2em] text-cyan-300">User Detail</p>
              <h3 class="mt-1 text-xl font-bold">用户详情</h3>
            </div>
            <button id="close-detail" class="rounded-lg border border-slate-500 bg-slate-800/80 px-3 py-1 text-sm hover:bg-slate-700/80">关闭</button>
          </div>
          <div id="detail-content" class="grid gap-3 text-sm text-slate-200 md:grid-cols-2"></div>
        </div>
      </div>
    </div>

    <script src="data.js"></script>
    <script src="common.js?v=20260401_liquid_modal1"></script>
    <script src='./js/pages/后台管理页面.inline-01.js?v=20260327_jssplit'></script>
  </body>
</html>
