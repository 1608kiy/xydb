    <!-- [JSMOD] pqr_密码强度检测 -->
    <script id="password-strength">
      var passwordInput = document.getElementById('register-password');
      var strengthBar = document.getElementById('password-strength-bar');
      var strengthText = document.getElementById('password-strength-text');
      var confirmPassword = document.getElementById('register-confirm-password');
      var passwordMismatch = document.getElementById('password-mismatch');
      var agreeTerms = document.getElementById('agree-terms');
      var registerBtn = document.getElementById('register-btn');

      // 检测密码强度
      function checkPasswordStrength(password) {
        var strength = 0;

        // 长度检查
        if (password.length >= 8) strength++;

        // 包含小写字母
        if (/[a-z]/.test(password)) strength++;

        // 包含大写字母
        if (/[A-Z]/.test(password)) strength++;

        // 包含数字
        if (/[0-9]/.test(password)) strength++;

        // 包含特殊字符
        if (/[^A-Za-z0-9]/.test(password)) strength++;

        // 更新强度条和文本
        updateStrengthUI(strength);
        return strength;
      }

      // 更新强度UI
      function updateStrengthUI(strength) {
        var width = '0%';
        var text = '弱';
        var color = 'bg-danger';
        switch (strength) {
          case 1:
          case 2:
            width = '33%';
            text = '弱';
            color = 'bg-danger';
            break;
          case 3:
            width = '66%';
            text = '中';
            color = 'bg-accent';
            break;
          case 4:
          case 5:
            width = '100%';
            text = '强';
            color = 'bg-secondary';
            break;
          default:
            width = '0%';
            text = '弱';
            color = 'bg-danger';
        }
        strengthBar.style.width = width;
        strengthBar.className = "h-full".concat(color, "rounded-full transition-all duration-300");
        strengthText.textContent = text;
        strengthText.className = "text-xs font-medium".concat(strength >= 4 ? 'text-secondary' : strength >= 3 ? 'text-accent' : 'text-danger');
      }

      // 检查密码是否匹配
      function checkPasswordMatch() {
        var password = passwordInput.value;
        var confirm = confirmPassword.value;
        if (password && confirm && password !== confirm) {
          passwordMismatch.classList.remove('hidden');
          return false;
        } else {
          passwordMismatch.classList.add('hidden');
          return true;
        }
      }

      // 检查注册按钮是否可点击
      function checkRegisterButton() {
        var password = passwordInput.value;
        var confirm = confirmPassword.value;
        var termsAgreed = agreeTerms.checked;
        var passwordStrength = checkPasswordStrength(password);
        var isPasswordValid = passwordStrength >= 3;
        var isMatch = password === confirm && password !== '';
        registerBtn.disabled = !(isPasswordValid && isMatch && termsAgreed);
      }

      // 绑定事件
      passwordInput.addEventListener('input', function () {
        checkPasswordStrength(this.value);
        checkPasswordMatch();
        checkRegisterButton();
      });
      confirmPassword.addEventListener('input', function () {
        checkPasswordMatch();
        checkRegisterButton();
      });
      agreeTerms.addEventListener('change', checkRegisterButton);
    </script>
    <!-- [/JSMOD] pqr_密码强度检测 -- 实现密码强度检测、密码匹配验证和注册按钮状态控制 -->
