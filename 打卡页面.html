      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#4F46E5',
              secondary: '#7C3AED',
              success: '#10B981',
              warning: '#F59E0B',
              danger: '#EF4444',
              info: '#3B82F6',
              light: '#F3F4F6',
              dark: '#1F2937',
              'task-work': '#3B82F6',
              'task-study': '#8B5CF6',
              'task-life': '#EC4899',
              'task-health': '#10B981'
            },
            fontFamily: {
              inter: ['Inter', 'system-ui', 'sans-serif']
            },
            animation: {
              'fade-in': 'fadeIn 0.4s ease-out',
              'slide-up': 'slideUp 0.5s ease-out',
              'pulse-glow': 'pulseGlow 2s infinite',
              'shimmer': 'shimmer 2.5s infinite'
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              },
              pulseGlow: {
                '0%, 100%': { boxShadow: '0 0 20px rgba(79, 70, 229, 0.3)' },
                '50%': { boxShadow: '0 0 40px rgba(79, 70, 229, 0.6)' }
              },
              shimmer: {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' }
              }
            }
          }
        }
      };
    </script>

          @apply h-full rounded-full transition-all duration-500 relative overflow-hidden;

        }

          @apply transform scale-95;
        }
        .calendar-day.today {

        }

          @apply bg-transparent border-transparent shadow-none cursor-default;
        }

  <body class="font-inter bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 text-gray-800 min-h-screen flex flex-col relative overflow-x-hidden fade-in scroll-smooth">

            </p>
          </div>
        </div>
        <div class="flex items-center space-x-6">
          <div class="hidden md:flex flex-col items-end text-xs text-gray-500">

            </span>
          </div>

            </button>

    <div class="flex flex-1 overflow-hidden">

                <div class="flex items-start space-x-3">
                  <div class="w-11 h-11 rounded-xl bg-gradient-to-br from-primary/20 to-secondary/20 flex items-center justify-center text-2xl shrink-0">

                  </div>
                  <div>

                      </button>

                        <i class="fas fa-running mr-1 text-task-health"></i>运动
                      </button>
                      <button class="type-btn type-badge inactive" data-type="早起">
                        <i class="fas fa-sun mr-1 text-warning"></i>早起
                      </button>

                  <button

                  >
                    <i class="fas fa-check mr-2"></i>今日打卡
                  </button>
                  <p id="checkin-status" class="text-xs text-gray-500 text-center">
                    今日尚未打卡
                  </p>
                </div>
              </div>
            </section>

            <section class="glass-card card-hover rounded-2xl p-2">

                <div class="text-center text-[9px] text-gray-400 font-medium h-3.5 flex items-center justify-center">四</div>

                <div class="stat-card">

                <div class="stat-card">

                  <div class="text-xs text-gray-400">次</div>
                </div>
              </div>

                <i class="fas fa-chart-bar mr-2 text-primary"></i>类型分布
              </h2>
              <div class="space-y-2.5">
                <div>
                  <div class="flex justify-between mb-1">
                    <span class="text-xs text-gray-600">
                      <i class="fas fa-book-open mr-1.5 text-task-study"></i>学习
                    </span>
                    <span data-type="study-percent" class="text-xs font-medium">0%</span>
                  </div>
                  <div class="progress-bar">
                    <div data-type="study-bar" class="progress-fill bg-gradient-to-r from-task-study to-primary" style="width: 0%"></div>
                  </div>
                </div>
                <div>
                  <div class="flex justify-between mb-1">
                    <span class="text-xs text-gray-600">
                      <i class="fas fa-running mr-1.5 text-task-health"></i>运动
                    </span>
                    <span data-type="sport-percent" class="text-xs font-medium">0%</span>
                  </div>
                  <div class="progress-bar">
                    <div data-type="sport-bar" class="progress-fill bg-gradient-to-r from-task-health to-success" style="width: 0%"></div>
                  </div>
                </div>
                <div>
                  <div class="flex justify-between mb-1">
                    <span class="text-xs text-gray-600">
                      <i class="fas fa-sun mr-1.5 text-warning"></i>早起
                    </span>
                    <span data-type="wake-percent" class="text-xs font-medium">0%</span>
                  </div>
                  <div class="progress-bar">
                    <div data-type="wake-bar" class="progress-fill bg-gradient-to-r from-warning to-orange-400" style="width: 0%"></div>

                </div>
                <div>

                      <i class="fas fa-book mr-1.5 text-info"></i>阅读
                    </span>
                    <span data-type="read-percent" class="text-xs font-medium">0%</span>

                  <div class="progress-bar">

                  </div>
                </div>

        </a>
        <a href="个人中心页面.html"
           class="tab-item flex flex-col items-center text-gray-500 hover:text-primary px-2 py-1 rounded-lg hover:bg-primary/10 transition-all duration-300">
          <i class="fas fa-user text-base"></i>
          <span class="text-xs mt-1">个人中心</span>
          <span class="tab-indicator"></span>
        </a>
      </div>
    </footer>

    <script>
      (function () {
        var now = new Date();
        var options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
        var dateString = now.toLocaleDateString('zh-CN', options);
        var el = document.getElementById('today-date-text');
        if (el) el.textContent = '今天 · ' + dateString;
      })();

      function renderCalendar() {
        var container = document.getElementById('checkin-calendar');
        if (!container) return;

        var now = new Date();
        var year = now.getFullYear();
        var month = now.getMonth();
        var today = now.getDate();

        var firstDay = new Date(year, month, 1);
        var lastDay = new Date(year, month + 1, 0);
        var startWeekday = firstDay.getDay();
        var daysInMonth = lastDay.getDate();

        startWeekday = startWeekday === 0 ? 6 : startWeekday - 1;

        var checkedInDays = [];
        if (AppState && AppState.checkins) {
          var currentMonth = year + '-' + String(month + 1).padStart(2, '0');
          AppState.checkins.forEach(function(item) {
            if (item.date && item.date.startsWith(currentMonth)) {
              var day = parseInt(item.date.split('-')[2], 10);
              if (!checkedInDays.includes(day)) {
                checkedInDays.push(day);
              }
            }
          });
        }

        var html = '';
        for (var i = 0; i < startWeekday; i++) {
          html += '<div class="calendar-day empty"></div>';
        }

        for (var day = 1; day <= daysInMonth; day++) {
          var isCheckedIn = checkedInDays.includes(day);
          var isToday = day === today;
          
          var classes = 'calendar-day ';
          if (isToday) {
            classes += 'today ';
          } else if (isCheckedIn) {
            classes += 'checked-in ';
          } else {
            classes += 'bg-white/70 border border-gray-200/50 shadow-sm ';
          }

          html += '<div class="' + classes + '">';
          html += '<span class="day-number">' + day + '</span>';
          if (isCheckedIn && !isToday) {
            html += '<i class="fas fa-check check-icon"></i>';
          }
          if (isToday) {
            html += '<span class="today-mark">✓</span>';
          }
          html += '</div>';
        }

        container.innerHTML = html;
      }

      if (typeof AppState !== 'undefined') {
        AppState.init();
      }
      if (typeof renderHeader === 'function') {
        renderHeader('checkin');
      }
      if (typeof renderFooter === 'function') {
        renderFooter('checkin');
      }
      if (typeof bindGlobalLogout === 'function') {
        bindGlobalLogout();
      }

      (function () {
        var btn = document.getElementById('checkin-btn');
        var status = document.getElementById('checkin-status');
        var list = document.getElementById('checkin-list');
        var noteInput = document.getElementById('checkin-note');
        var clearBtn = document.getElementById('clear-history');
        var selectedType = '学习';

        var typeButtons = document.querySelectorAll('.type-btn');
        typeButtons.forEach(function (b) {
          b.addEventListener('click', function () {
            typeButtons.forEach(function (x) {
              x.classList.remove('active', 'bg-primary', 'text-white', 'border-primary');
              x.classList.add('inactive', 'bg-white', 'text-gray-600', 'border-gray-200');
            });
            this.classList.remove('inactive', 'bg-white', 'text-gray-600', 'border-gray-200');
            this.classList.add('active', 'bg-primary', 'text-white', 'border-primary');
            selectedType = this.getAttribute('data-type') || '学习';
          });
        });

        function renderCheckins() {
          if (!list) return;
          list.innerHTML = '';
          if (AppState && AppState.checkins && AppState.checkins.length > 0) {
            AppState.checkins.slice().reverse().forEach(function (item) {
              var li = document.createElement('li');
              li.className = 'checkin-item';
              li.innerHTML = 
                '<div>' +
                  '<div class="text-gray-800 font-medium text-sm mb-0.5">' + item.time + '</div>' +
                  '<div class="text-gray-600 text-sm">' +
                    '<span class="inline-block px-2 py-0.5 rounded bg-primary/10 text-primary text-xs mr-1.5">' + 
                    item.type + '</span>' + item.note +
                  '</div>' +
                '</div>' +
                '<span class="text-xs text-success font-medium">' + item.status + '</span>';
              list.appendChild(li);
            });
          } else {
            list.innerHTML = '<li class="text-center text-gray-400 text-sm py-4">暂无打卡记录</li>';
          }
        }

        function updateStreak() {
          var streakEl = document.getElementById('streak-days');
          var bestEl = document.getElementById('max-streak');
          if (!streakEl || !AppState || !AppState.checkins) return;
          
          var today = new Date();
          var currentStreak = 0;
          var date = new Date(today);
          
          while (true) {
            var key = date.toISOString().slice(0, 10);
            if (AppState.checkins.some((c) => c.date === key)) {
              currentStreak++;
              date.setDate(date.getDate() - 1);
            } else {
              break;
            }
          }
          
          if (streakEl) streakEl.textContent = String(currentStreak);
          if (bestEl) bestEl.textContent = String(currentStreak);
          
          return currentStreak;
        }

        function getCheckinStats() {
          if (!AppState || !AppState.checkins) {
            return {
              monthCheckins: 0,
              maxStreak: 0,
              currentStreak: 0,
              weekCheckins: 0,
              typeDistribution: { '学习': 0, '运动': 0, '早起': 0, '阅读': 0 },
              totalCheckins: 0
            };
          }

          var now = new Date();
          var currentMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
          var weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
          
          var monthCheckins = 0;
          var weekCheckins = 0;
          var typeDistribution = { '学习': 0, '运动': 0, '早起': 0, '阅读': 0 };
          
          AppState.checkins.forEach(function(item) {
            if (item.date && item.date.startsWith(currentMonth)) {
              monthCheckins++;
            }
            if (item.date) {
              var itemDate = new Date(item.date + 'T00:00:00');
              if (itemDate >= weekAgo) {
                weekCheckins++;
              }
            }
            if (item.type && typeDistribution.hasOwnProperty(item.type)) {
              typeDistribution[item.type]++;
            }
          });

          var currentStreak = 0;
          var date = new Date(now);
          while (true) {
            var key = date.toISOString().slice(0, 10);
            if (AppState.checkins.some((c) => c.date === key)) {
              currentStreak++;
              date.setDate(date.getDate() - 1);
            } else {
              break;
            }
          }

          var sortedCheckins = [...AppState.checkins].sort((a, b) => 
            new Date(a.date).getTime() - new Date(b.date).getTime()
          );
          
          var maxStreak = 0;
          var tempStreak = 0;
          var prevDate = null;
          
          for (var i = 0; i < sortedCheckins.length; i++) {
            var curDate = new Date(sortedCheckins[i].date);
            curDate.setHours(0, 0, 0, 0);
            
            if (!prevDate) {
              tempStreak = 1;
            } else {
              var prevD = new Date(prevDate);
              prevD.setDate(prevD.getDate() + 1);
              var diffDays = Math.round((curDate - prevD) / (1000 * 60 * 60 * 24));
              if (diffDays === 0) {
                tempStreak++;
              } else {
                maxStreak = Math.max(maxStreak, tempStreak);
                tempStreak = 1;
              }
            }
            prevDate = curDate;
          }
          maxStreak = Math.max(maxStreak, tempStreak);

          return {
            monthCheckins: monthCheckins,
            maxStreak: maxStreak,
            currentStreak: currentStreak,
            weekCheckins: weekCheckins,
            typeDistribution: typeDistribution,
            totalCheckins: AppState.checkins.length
          };
        }

        function updateCheckinStatistics() {
          var stats = getCheckinStats();
          
          var monthEl = document.getElementById('month-days');
          if (monthEl) monthEl.textContent = stats.monthCheckins;
          
          var maxEl = document.getElementById('max-streak');
          if (maxEl) maxEl.textContent = stats.maxStreak;
          
          var currentEl = document.getElementById('current-streak');
          if (currentEl) currentEl.textContent = stats.currentStreak;
          
          var weekEl = document.getElementById('week-count');
          if (weekEl) weekEl.textContent = stats.weekCheckins;
          
          updateTypeDistribution(stats.typeDistribution, stats.totalCheckins);
        }
        
        function updateTypeDistribution(distribution, total) {
          var types = {
            '学习': 'study',
            '运动': 'sport',
            '早起': 'wake',
            '阅读': 'read'
          };
          
          Object.keys(types).forEach(function(typeName) {
            var count = distribution[typeName] || 0;
            var percent = total > 0 ? Math.round((count / total) * 100) : 0;
            
            var percentEl = document.querySelector('[data-type="' + types[typeName] + '-percent"]');
            var barEl = document.querySelector('[data-type="' + types[typeName] + '-bar"]');
            
            if (percentEl) percentEl.textContent = percent + '%';
            if (barEl) {
              setTimeout(function() {
                barEl.style.width = percent + '%';
              }, 300);
            }
          });
        }

        if (btn && status && list) {
          btn.addEventListener('click', function () {
            var todayKey = new Date().toISOString().slice(0, 10);
            var alreadyCheckedIn = AppState && AppState.checkins && 
                                   AppState.checkins.some(c => c.date === todayKey);

            if (alreadyCheckedIn) {
              if (typeof showToast === 'function') {
                showToast('今日已打卡，请勿重复提交');
              } else {
                alert('今日已打卡，请勿重复提交');
              }
              return;
            }

            var note = (noteInput && noteInput.value.trim()) || '今日已坚持打卡一次';
            var now = new Date();
            var timeStr = now.getHours().toString().padStart(2, '0') + ':' + 
                          now.getMinutes().toString().padStart(2, '0');

            if (!AppState) window.AppState = { checkins: [] };
            if (!AppState.checkins) AppState.checkins = [];
            
            AppState.checkins.push({
              id: typeof generateId === 'function' ? generateId('c') : 'c_' + Date.now(),
              date: todayKey,
              time: timeStr,
              type: selectedType,
              note: note,
              status: '已完成'
            });

            if (typeof localStorage !== 'undefined') {
              localStorage.setItem('todoApp_checkins', JSON.stringify(AppState.checkins));
            }

            if (typeof showToast === 'function') {
              showToast('打卡成功！');
            }
            
            renderCheckins();
            renderCalendar();
            updateStreak();
            updateCheckinStatistics();

            status.textContent = '今日已打卡 ✓';
            status.className = 'text-xs text-primary text-center font-medium';
            if (noteInput) noteInput.value = '';
            
            btn.classList.add('scale-95');
            setTimeout(function() {
              btn.classList.remove('scale-95');
            }, 150);
          });
        }

        if (clearBtn) {
          clearBtn.addEventListener('click', function () {
            if (confirm('确定要清空所有打卡记录吗？此操作不可恢复！')) {
              if (AppState) {
                AppState.checkins = [];
                if (typeof localStorage !== 'undefined') {
                  localStorage.removeItem('todoApp_checkins');
                }
              }
              renderCheckins();
              renderCalendar();
              updateCheckinStatistics();
              updateStreak();
              if (status) {
                status.textContent = '今日尚未打卡';
                status.className = 'text-xs text-gray-500 text-center';
              }
              if (typeof showToast === 'function') {
                showToast('打卡记录已清空');
              }
            }
          });
        }

        renderCheckins();
        renderCalendar();
        updateStreak();
        updateCheckinStatistics();

        var todayKey = new Date().toISOString().slice(0, 10);
        if (AppState && AppState.checkins && 
            AppState.checkins.some(c => c.date === todayKey)) {
          if (status) {
            status.textContent = '今日已打卡 ✓';
            status.className = 'text-xs text-primary text-center font-medium';
          }
        }
      })();

      window.addEventListener('load', function() {
        setTimeout(function() {
          if (typeof renderCalendar === 'function') {
            renderCalendar();
          }
        }, 100);
      });
    </script>
  </body>
</html>
