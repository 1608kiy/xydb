<div class="editor-view" data-id="styleEditor">
    <hr>
    <div class="editor-view-header">
        <span class="suppress-button"></span>
        <label class="header">样式</label>
    </div>
    <div class="editor-view-body">
        <table class='property-grid small'>
            <!-- Font -->
            <tr>
                <td>
                    字体
                </td>
                <td>
                    <div
                        style="width: 100%; display: block; position: relative; padding-right: 60px; box-sizing: border-box;">
                        <label class="font-face k-combo small" style="width: 100%; margin: 0; padding: 0">
                            <input type="text" style="width: 100%;">
                            <select tabindex="-1">
                            </select>
                        </label>
                        <label class="font-size k-combo small"
                            style="position: absolute; right: 0; top: 0; width: 55px;">
                            <input type="text" style="width: 100%;">
                            <select tabindex="-1">
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                                <option value="12">12</option>
                                <option value="13">13</option>
                                <option value="15">15</option>
                                <option value="16">16</option>
                                <option value="18">18</option>
                                <option value="20">20</option>
                                <option value="22">22</option>
                                <option value="24">24</option>
                                <option value="26">26</option>
                                <option value="28">28</option>
                                <option value="32">32</option>
                                <option value="36">36</option>
                                <option value="42">42</option>
                            </select>
                        </label>
                    </div>
                </td>
            </tr>

            <!-- Color -->
            <tr>
                <td>
                    颜色
                </td>
                <td style="display: flex; gap: 0.5em; align-items: center;">
                    <span class="k-sprite staruml-icon icon-tool-fill-color" style="min-width: 16px;"></span>
                    <div class="k-color-input-wrapper">
                        <div class="fill-color k-color-input small" title="填充颜色"></div>
                    </div>

                    <span class="k-sprite staruml-icon icon-tool-line-color" style="min-width: 16px;"></span>
                    <div class="k-color-input-wrapper">
                        <div class="line-color k-color-input small" title="线条颜色"></div>
                    </div>

                    <span class="k-sprite staruml-icon icon-tool-font-color" style="min-width: 16px;"></span>
                    <div class="k-color-input-wrapper">
                        <div class="font-color k-color-input small" title="文本颜色"></div>
                    </div>

                    <div style="display: inline-flex; align-items: center; gap: .5em; margin-left: .3em;">
                        <label class="k-checkbox">
                            <input type="checkbox" class="inherit-style">
                            <div class="k-checkbox__checkmark"></div>
                        </label>
                        <div>继承</div>
                    </div>
                </td>
            </tr>

            <!-- Line Style -->
            <tr>
                <td>
                    线条样式
                </td>
                <td>
                    <div style="display: flex; flex-direction: row;">
                        <div class="radio-button-bar icon-group" style="margin-right: 0.2rem;">
                            <label class="radio-button-bar__item">
                                <input id="style-editor-line-style-rectilinear" type="radio" name="line-style"
                                    value="0">
                                <label for="style-editor-line-style-rectilinear" class="line-style k-button small"
                                    title="直线"><span
                                        class="k-sprite staruml-icon icon-tool-rectilinear" /></label>
                            </label>
                            <label class="radio-button-bar__item">
                                <input id="style-editor-line-style-oblique" type="radio" name="line-style" value="1">
                                <label for="style-editor-line-style-oblique" class="line-style k-button small"
                                    title="斜线"><span class="k-sprite staruml-icon icon-tool-oblique" /></label>
                            </label>
                            <label class="radio-button-bar__item">
                                <input id="style-editor-line-style-roundrect" type="radio" name="line-style" value="2">
                                <label for="style-editor-line-style-roundrect" class="line-style k-button small"
                                    title="圆角直线"><span
                                        class="k-sprite staruml-icon icon-tool-rounded-rectilinear" /></label>
                            </label>
                            <label class="radio-button-bar__item">
                                <input id="style-editor-line-style-curve" type="radio" name="line-style" value="3">
                                <label for="style-editor-line-style-curve" class="line-style k-button small"
                                    title="曲线"><span class="k-sprite staruml-icon icon-tool-curve" /></label>
                            </label>
                        </div>
                        <div class="style-editor-line-mode radio-button-bar icon-group" style="margin-right: 0.2rem;">
                            <label class="radio-button-bar__item">
                                <input id="style-editor-line-mode-solid" type="radio" name="line-mode" value="0">
                                <label for="style-editor-line-mode-solid" class="line-mode k-button small"
                                    title="实线"><span
                                        class="k-sprite staruml-icon icon-tool-linemode-solid" /></label>
                            </label>
                            <label class="radio-button-bar__item">
                                <input id="style-editor-line-mode-dotted" type="radio" name="line-mode" value="1">
                                <label for="style-editor-line-mode-dotted" class="line-mode k-button small"
                                    title="虚线"><span
                                        class="k-sprite staruml-icon icon-tool-linemode-dotted" /></label>
                            </label>
                            <label class="radio-button-bar__item">
                                <input id="style-editor-line-mode-dashed" type="radio" name="line-mode" value="2">
                                <label for="style-editor-line-mode-dashed" class="line-mode k-button small"
                                    title="点线"><span
                                        class="k-sprite staruml-icon icon-tool-linemode-dashed" /></label>
                            </label>
                        </div>
                    </div>
                </td>
            </tr>

            <!-- Line End -->
            <tr class="style-editor-line-end">
                <td>
                    线条端点
                </td>
                <td>
                    <div style="display: flex; flex-direction: row;">
                        <div class="style-editor-tail-end-style radio-button-bar icon-group"
                            style="margin-right: 0.2rem;">
                            <label class="radio-button-bar__item">
                                <input id="style-editor-tail-end-style-flat" type="radio" name="tail-end-style"
                                    value="0">
                                <label for="style-editor-tail-end-style-flat" class="tail-end-style k-button small"
                                    title="平的（线尾）"><span
                                        class="k-sprite staruml-icon icon-tool-tail-end-style-flat" /></label>
                            </label>
                            <label class="radio-button-bar__item">
                                <input id="style-editor-tail-end-style-stick" type="radio" name="tail-end-style"
                                    value="1">
                                <label for="style-editor-tail-end-style-stick" class="tail-end-style k-button small"
                                    title="线性箭头（线尾）"><span
                                        class="k-sprite staruml-icon icon-tool-tail-end-style-stick" /></label>
                            </label>
                            <label class="radio-button-bar__item">
                                <input id="style-editor-tail-end-style-solid" type="radio" name="tail-end-style"
                                    value="2">
                                <label for="style-editor-tail-end-style-solid" class="tail-end-style k-button small"
                                    title="实心箭头（线尾）"><span
                                        class="k-sprite staruml-icon icon-tool-tail-end-style-solid" /></label>
                            </label>
                        </div>
                        <div class="style-editor-head-end-style radio-button-bar icon-group">
                            <label class="radio-button-bar__item">
                                <input id="style-editor-head-end-style-flat" type="radio" name="head-end-style"
                                    value="0">
                                <label for="style-editor-head-end-style-flat" class="head-end-style k-button small"
                                    title="平的（线头）"><span
                                        class="k-sprite staruml-icon icon-tool-head-end-style-flat" /></label>
                            </label>
                            <label class="radio-button-bar__item">
                                <input id="style-editor-head-end-style-stick" type="radio" name="head-end-style"
                                    value="1">
                                <label for="style-editor-head-end-style-stick" class="head-end-style k-button small"
                                    title="线性箭头（线头）"><span
                                        class="k-sprite staruml-icon icon-tool-head-end-style-stick" /></label>
                            </label>
                            <label class="radio-button-bar__item">
                                <input id="style-editor-head-end-style-solid" type="radio" name="head-end-style"
                                    value="2">
                                <label for="style-editor-head-end-style-solid" class="head-end-style k-button small"
                                    title="实心箭头（线头）"><span
                                        class="k-sprite staruml-icon icon-tool-head-end-style-solid" /></label>
                            </label>
                        </div>
                    </div>
                </td>
            </tr>

            <!-- Format -->
            <tr>
                <td>
                    格式
                </td>
                <td>
                    <div class="k-button-bar icon-group">
                        <div class="k-button-bar__item">
                            <input type="checkbox" class="auto-resize">
                            <label class="k-button auto-resize" title="自动调整大小"><span
                                    class="k-sprite staruml-icon icon-tool-auto-resize" /></label>
                        </div>
                        <div class="k-button-bar__item">
                            <input type="checkbox" class="show-shadow">
                            <label class="k-button show-shadow" title="显示阴影"><span
                                    class="k-sprite staruml-icon icon-tool-show-shadow" /></label>
                        </div>
                        <div class="k-button-bar__item">
                            <input type="checkbox" class="word-wrap">
                            <label class="k-button word-wrap" title="自动换行"><span
                                    class="k-sprite staruml-icon icon-tool-wordwrap" /></label>
                        </div>
                    </div>
                    <div style="display: inline-block; vertical-align: bottom">
                        <label class="k-select small stereotype-display">
                            <select title="类型显示">
                                <option value="none">无</option>
                                <option value="label">标签</option>
                                <option value="decoration">修饰</option>
                                <option value="decoration-label">带标签的修饰</option>
                                <option value="icon">图标</option>
                                <option value="icon-label">带标签的图标</option>
                            </select>
                        </label>
                    </div>
                </td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <div class="k-button-bar icon-group">
                        <div class="k-button-bar__item">
                            <input type="checkbox" class="show-visibility">
                            <label class="k-button show-visibility" title="显示可见性"><span
                                    class="k-sprite staruml-icon icon-tool-show-visibility" /></label>
                        </div>
                        <div class="k-button-bar__item">
                            <input type="checkbox" class="show-namespace">
                            <label class="k-button show-namespace" title="显示命名空间"><span
                                    class="k-sprite staruml-icon icon-tool-show-namespace" /></label>
                        </div>
                        <div class="k-button-bar__item">
                            <input type="checkbox" class="show-property">
                            <label class="k-button show-property" title="显示属性"><span
                                    class="k-sprite staruml-icon icon-tool-show-property" /></label>
                        </div>
                        <div class="k-button-bar__item">
                            <input type="checkbox" class="show-type">
                            <label class="k-button show-type" title="显示类型"><span
                                    class="k-sprite staruml-icon icon-tool-show-type" /></label>
                        </div>
                    </div>
                    <div class="k-button-bar icon-group">
                        <div class="k-button-bar__item">
                            <input type="checkbox" class="suppress-attributes">
                            <label class="k-button suppress-attributes" title="隐藏属性"><span
                                    class="k-sprite staruml-icon icon-tool-suppress-attributes" /></label>
                        </div>
                        <div class="k-button-bar__item">
                            <input type="checkbox" class="suppress-operations">
                            <label class="k-button suppress-operations" title="隐藏操作"><span
                                    class="k-sprite staruml-icon icon-tool-suppress-operations" /></label>
                        </div>
                        <div class="k-button-bar__item">
                            <input type="checkbox" class="suppress-receptions">
                            <label class="k-button suppress-receptions" title="隐藏接收"><span
                                    class="k-sprite staruml-icon icon-tool-suppress-receptions" /></label>
                        </div>
                        <div class="k-button-bar__item">
                            <input type="checkbox" class="suppress-literals">
                            <label class="k-button suppress-literals" title="隐藏字面量"><span
                                    class="k-sprite staruml-icon icon-tool-suppress-literals" /></label>
                        </div>
                        <div class="k-button-bar__item">
                            <input type="checkbox" class="suppress-columns">
                            <label class="k-button suppress-columns" title="隐藏列"><span
                                    class="k-sprite staruml-icon icon-tool-suppress-columns" /></label>
                        </div>
                    </div>
                </td>
            </tr>

            <!-- Text Alignment -->
            <tr class="style-editor-text-align">
                <td>
                    文本对齐
                </td>
                <td style="display: flex; flex-direction: row;">
                    <div class="horz-text-align radio-button-bar icon-group" style="margin-right: 0.2rem;">
                        <label class="radio-button-bar__item">
                            <input id="horz-text-align-left" type="radio" name="horz-text-align" value="0">
                            <label for="horz-text-align-left" class="horz-text-align k-button small" title="左对齐"><span
                                    class="k-sprite staruml-icon icon-tool-text-align-left" /></label>
                        </label>
                        <label class="radio-button-bar__item">
                            <input id="horz-text-align-center" type="radio" name="horz-text-align" value="2">
                            <label for="horz-text-align-center" class="horz-text-align k-button small"
                                title="居中"><span
                                    class="k-sprite staruml-icon icon-tool-text-align-center" /></label>
                        </label>
                        <label class="radio-button-bar__item">
                            <input id="horz-text-align-right" type="radio" name="horz-text-align" value="1">
                            <label for="horz-text-align-right" class="horz-text-align k-button small"
                                title="右对齐"><span class="k-sprite staruml-icon icon-tool-text-align-right" /></label>
                        </label>
                    </div>
                    <div class="vert-text-align radio-button-bar icon-group" style="margin-right: 0.2rem;">
                        <label class="radio-button-bar__item">
                            <input id="vert-text-align-left" type="radio" name="vert-text-align" value="3">
                            <label for="vert-text-align-left" class="vert-text-align k-button small" title="顶部对齐"><span
                                    class="k-sprite staruml-icon icon-tool-text-align-top" /></label>
                        </label>
                        <label class="radio-button-bar__item">
                            <input id="vert-text-align-center" type="radio" name="vert-text-align" value="5">
                            <label for="vert-text-align-center" class="vert-text-align k-button small"
                                title="居中对齐"><span
                                    class="k-sprite staruml-icon icon-tool-text-align-middle" /></label>
                        </label>
                        <label class="radio-button-bar__item">
                            <input id="vert-text-align-right" type="radio" name="vert-text-align" value="4">
                            <label for="vert-text-align-right" class="vert-text-align k-button small"
                                title="底部对齐"><span
                                    class="k-sprite staruml-icon icon-tool-text-align-bottom" /></label>
                        </label>
                    </div>
                </td>
            </tr>

            <!-- Alignment -->
            <tr>
                <td>
                    对齐
                </td>
                <td>
                    <div class="k-button-bar icon-group">
                        <div class="k-button-bar__item">
                            <button class="k-button send-to-back" title="置于底部"><span
                                    class="k-sprite staruml-icon icon-tool-send-to-back" /></button>
                        </div>
                        <div class="k-button-bar__item">
                            <button class="k-button bring-to-front" title="置于顶部"><span
                                    class="k-sprite staruml-icon icon-tool-bring-to-front" /></button>
                        </div>
                    </div>
                    <div class="k-button-bar icon-group">
                        <div class="k-button-bar__item">
                            <button class="k-button align-left" title="左对齐(Align Left)"><span
                                    class="k-sprite staruml-icon icon-tool-align-left" /></button>
                        </div>
                        <div class="k-button-bar__item">
                            <button class="k-button align-center" title="居中对齐(Align Center)"><span
                                    class="k-sprite staruml-icon icon-tool-align-center" /></button>
                        </div>
                        <div class="k-button-bar__item">
                            <button class="k-button align-right" title="右对齐(Align Right)"><span
                                    class="k-sprite staruml-icon icon-tool-align-right" /></button>
                        </div>
                    </div>
                    <div class="k-button-bar icon-group">
                        <div class="k-button-bar__item">
                            <button class="k-button align-top" title="顶部对齐(Align Top)"><span
                                    class="k-sprite staruml-icon icon-tool-align-top" /></button>
                        </div>
                        <div class="k-button-bar__item">
                            <button class="k-button align-middle" title="垂直居中(Align Middle)"><span
                                    class="k-sprite staruml-icon icon-tool-align-middle" /></button>
                        </div>
                        <div class="k-button-bar__item">
                            <button class="k-button align-bottom" title="底部对齐(Align Bottom)"><span
                                    class="k-sprite staruml-icon icon-tool-align-bottom" /></button>
                        </div>
                    </div>
                    <div class="k-button-bar icon-group">
                        <div class="k-button-bar__item">
                            <button class="k-button space-equal-horz" title="水平等间距"><span
                                    class="k-sprite staruml-icon icon-tool-align-space-even-horz" /></button>
                        </div>
                        <div class="k-button-bar__item">
                            <button class="k-button space-equal-vert" title="垂直等间距"><span
                                    class="k-sprite staruml-icon icon-tool-align-space-even-vert" /></button>
                        </div>
                    </div>
                    <div class="k-button-bar icon-group">
                        <div class="k-button-bar__item">
                            <button class="k-button set-width-equal" title="设置宽度等距"><span
                                    class="k-sprite staruml-icon icon-tool-set-width-equal" /></button>
                        </div>
                        <div class="k-button-bar__item">
                            <button class="k-button set-height-equal" title="设置高度等距"><span
                                    class="k-sprite staruml-icon icon-tool-set-height-equal" /></button>
                        </div>
                        <div class="k-button-bar__item">
                            <button class="k-button set-size-equal" title="设置尺寸等距"><span
                                    class="k-sprite staruml-icon icon-tool-set-size-equal" /></button>
                        </div>
                    </div>
                </td>
            </tr>

        </table>
    </div>
</div>
