<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" fill="none">
  <defs>
    <linearGradient id="bgDark" x1="120" y1="40" x2="1320" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111A2F"/>
    </linearGradient>
    <linearGradient id="panelDark" x1="220" y1="180" x2="1220" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17233A"/>
      <stop offset="1" stop-color="#1B2B47"/>
    </linearGradient>
    <linearGradient id="titleDark" x1="260" y1="110" x2="760" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="#93C5FD"/>
      <stop offset="1" stop-color="#A5B4FC"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="900" fill="url(#bgDark)"/>
  <circle cx="170" cy="120" r="130" fill="#1D4ED8" fill-opacity="0.24"/>
  <circle cx="1290" cy="760" r="180" fill="#312E81" fill-opacity="0.28"/>
  <circle cx="1210" cy="130" r="90" fill="#0EA5E9" fill-opacity="0.2"/>

  <text x="220" y="120" fill="url(#titleDark)" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="800">XYDB Smart Planner</text>
  <text x="220" y="160" fill="#B6C4DA" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="500">
    Todo · Calendar · Pomodoro · Weekly Report · Check-in · Profile
  </text>

  <rect x="200" y="200" width="1040" height="560" rx="28" fill="url(#panelDark)" stroke="#334155" stroke-width="2"/>

  <g font-family="Segoe UI, Arial, sans-serif">
