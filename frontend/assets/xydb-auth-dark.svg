    <text x="335" y="322" fill="#9FB2CD" font-size="18">Task focus and execution</text>

    <rect x="575" y="250" width="290" height="140" rx="20" fill="#152C3E" stroke="#2C4E68"/>
    <circle cx="625" cy="300" r="20" fill="#22D3EE"/>
    <text x="660" y="292" fill="#E2E8F0" font-size="26" font-weight="700">Calendar</text>
    <text x="660" y="322" fill="#9FB2CD" font-size="18">Visual timeline planning</text>

    <rect x="900" y="250" width="290" height="140" rx="20" fill="#2B2634" stroke="#51446A"/>
    <circle cx="950" cy="300" r="20" fill="#FB923C"/>
    <text x="985" y="292" fill="#E2E8F0" font-size="26" font-weight="700">Pomodoro</text>
    <text x="985" y="322" fill="#9FB2CD" font-size="18">Deep-work time blocks</text>

    <rect x="250" y="430" width="290" height="140" rx="20" fill="#152F2B" stroke="#2D5B55"/>
    <circle cx="300" cy="480" r="20" fill="#34D399"/>
    <text x="335" y="472" fill="#E2E8F0" font-size="26" font-weight="700">Check-in</text>
    <text x="335" y="502" fill="#9FB2CD" font-size="18">Habit consistency tracking</text>

    <rect x="575" y="430" width="290" height="140" rx="20" fill="#332631" stroke="#5F4257"/>
    <circle cx="625" cy="480" r="20" fill="#F87171"/>
    <text x="660" y="472" fill="#E2E8F0" font-size="26" font-weight="700">Weekly Report</text>
    <text x="660" y="502" fill="#9FB2CD" font-size="18">Insights and performance</text>

    <rect x="900" y="430" width="290" height="140" rx="20" fill="#27264A" stroke="#47467B"/>
