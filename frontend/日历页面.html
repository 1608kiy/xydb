    <style type="text/tailwindcss">

          .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255, 179, 71, 0.4); border-radius: 3px; }

          /* ✅ 毛玻璃效果 - 增强 */
          .glass { 
            background: rgba(255, 255, 255, 0.55); 
            backdrop-filter: blur(24px) saturate(200%); 
            -webkit-backdrop-filter: blur(24px) saturate(200%); 
            border: 1px solid rgba(255, 255, 255, 0.5);
          }
          .glass-strong {

            -webkit-backdrop-filter: blur(32px) saturate(200%);

          }
          .glass-max { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(40px) saturate(200%); 
            -webkit-backdrop-filter: blur(40px) saturate(200%);

          }
          .glass-tab {

          }
          .glass-header { 
            background: rgba(255, 255, 255, 0.55); 
            backdrop-filter: blur(24px) saturate(200%); 
            -webkit-backdrop-filter: blur(24px) saturate(200%); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
          }
          .glass-card { 
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(24px) saturate(200%); 
            -webkit-backdrop-filter: blur(24px) saturate(200%); 
            border: 1px solid rgba(255, 255, 255, 0.55);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
          }
          .glass-input { 
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(16px) saturate(200%); 
            -webkit-backdrop-filter: blur(16px) saturate(200%); 
            border: 1px solid rgba(209, 213, 219, 0.7); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
          }
          .glass-input:focus { 
            background: rgba(255, 255, 255, 0.85); 
            border-color: rgba(255, 179, 71, 0.6); 
            box-shadow: 0 0 0 3px rgba(255, 179, 71, 0.18);
          }
          
          /* ✅ 背景装饰光斑 */
          .bg-orb { 
            position: fixed; 
            border-radius: 50%; 
            filter: blur(160px); 
            opacity: 0.1; 
            pointer-events: none; 
            z-index: 0; 
            animation: orbFloat 24s ease-in-out infinite; 
          }
          .bg-orb-primary { 
            background: linear-gradient(135deg, #FFB347, #FFC778); 
          }
          .bg-orb-secondary { 
            background: linear-gradient(135deg, #FFC778, #FFE5B4); 
          }
          @keyframes orbFloat { 
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.1; } 
            33% { transform: translate(40px, -40px) scale(1.1); opacity: 0.14; }
            66% { transform: translate(-30px, 30px) scale(0.95); opacity: 0.09; }
          }
          
          /* ✅ 动画效果 - 月份切换优化 */
          .fade-in { 
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
          }
          @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
          }
          .slide-up { 
            animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
          }
          @keyframes slideUp { 
            from { opacity: 0; transform: translateY(24px); } 
            to { opacity: 1; transform: translateY(0); } 
          }
          .scale-in { 
            animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); 
          }
          @keyframes scaleIn { 
            from { opacity: 0; transform: scale(0.92); } 
            to { opacity: 1; transform: scale(1); } 
          }
          .slide-in-right { 
            animation: slideInRight 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
          }
          @keyframes slideInRight { 
            from { opacity: 0; transform: translateX(40px); } 
            to { opacity: 1; transform: translateX(0); } 
          }
          .float { 
            animation: float 4s ease-in-out infinite; 
          }
          @keyframes float { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-6px); } 
          }
          .pulse-glow { 
            animation: pulseGlow 2s ease-in-out infinite; 
          }
          @keyframes pulseGlow { 
            0%, 100% { box-shadow: 0 0 24px rgba(255, 179, 71, 0.4); } 
            50% { box-shadow: 0 0 40px rgba(255, 179, 71, 0.6); } 
          }
          
          /* ✅ 卡片样式 */
          .card-shadow { 
            box-shadow: 0 2px 8px rgba(255, 179, 71, 0.12); 
          }
          .card-hover { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
          }
          .card-hover:hover { 
            box-shadow: 0 12px 32px rgba(255, 179, 71, 0.22); 
            transform: translateY(-4px); 
          }
          
          /* ✅ 日历格子样式 */
          .calendar-cell { 
            @apply relative rounded-2xl p-2.5 text-right text-sm transition-all duration-300 border;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px) saturate(200%);
            -webkit-backdrop-filter: blur(16px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.6);
          }
          .calendar-cell.other-month { 
            background: rgba(249, 250, 251, 0.45);
            color: rgba(156, 163, 175, 0.5);
            border: 1px solid rgba(243, 244, 246, 0.45);
          }
          .calendar-cell.today { 
            background: linear-gradient(135deg, rgba(255, 179, 71, 0.22) 0%, rgba(255, 199, 120, 0.15) 100%);
            border: 2px solid rgba(255, 179, 71, 0.55);
            box-shadow: 0 6px 20px rgba(255, 179, 71, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.7);
          }
          .calendar-cell:hover { 
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 8px 24px rgba(255, 179, 71, 0.22);
            transform: translateY(-3px);
            border-color: rgba(255, 179, 71, 0.5);
          }
          
          /* ✅ 任务分类标签 */
          .tag-work { 
            @apply bg-task-work/20 text-task-work border border-task-work/40; 
          }
          .tag-study { 
            @apply bg-task-study/20 text-task-study border border-task-study/40; 
          }
          .tag-life { 
            @apply bg-task-life/20 text-task-life border border-task-life/40; 
          }
          .tag-health { 
            @apply bg-task-health/20 text-task-health border border-task-health/40; 
          }
          
          /* ✅ Tab 项样式 */
          .tab-item { 
            @apply relative transition-all duration-300; 
          }
          .tab-item:hover { 
            @apply scale-105; 
          }
          .tab-item.active .tab-indicator { 
            @apply opacity-100 scale-100; 
          }
          .tab-indicator { 
            @apply absolute -top-1 left-1/2 transform -translate-x-1/2 w-1.5 h-1.5 bg-primary rounded-full opacity-0 scale-0 transition-all duration-300;
            box-shadow: 0 0 8px rgba(255, 179, 71, 0.7);
          }
          
          /* ✅ 按钮样式 - 参考个人中心 */
          .btn-primary { 
            @apply inline-flex items-center justify-center px-4 py-2 rounded-xl text-sm font-medium transition-all duration-300;
            background: linear-gradient(135deg, rgba(255, 179, 71, 0.95), rgba(255, 199, 120, 0.9));
            color: white;
            border: 1px solid rgba(255, 179, 71, 0.6);
            box-shadow: 0 4px 12px rgba(255, 179, 71, 0.3);
          }
          .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 179, 71, 0.4);
          }
          
          .btn-glass {
            @apply inline-flex items-center justify-center px-4 py-2 glass-card rounded-xl text-sm font-medium transition-all duration-300;
            color: #374151;
          }
          .btn-glass:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(255, 179, 71, 0.45);
            box-shadow: 0 6px 16px rgba(255, 179, 71, 0.2);
            transform: translateY(-2px);
          }
          
          /* ✅ 下拉菜单样式 - 修复层级问题 */
          .dropdown-menu {
            @apply absolute right-0 w-48 rounded-2xl shadow-2xl py-2 overflow-hidden;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.7);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px) scale(0.96);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 99999;
          }
          .dropdown-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
          }
          .dropdown-item {
            @apply block px-4 py-2.5 text-sm text-gray-700 hover:bg-primary/15 hover:text-primary transition-all duration-200 cursor-pointer;
          }
          .dropdown-item:first-child {
            border-top-left-radius: 1rem;
            border-top-right-radius: 1rem;
          }
          .dropdown-item:last-child {
            border-bottom-left-radius: 1rem;
            border-bottom-right-radius: 1rem;
          }
          
          /* ✅ Toast 提示样式 - 右上角弹出，配色协调 */
          .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            min-width: 280px;
            padding: 14px 20px;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            z-index: 100000;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.7);
            opacity: 0;
            transform: translateX(120px);
          }
          .toast.show {
            opacity: 1;
            transform: translateX(0);
          }
          .toast.success {
            border-left: 4px solid #F59E0B;
            background: linear-gradient(90deg, rgba(245, 158, 11, 0.08), rgba(255, 255, 255, 0.95));
          }
          .toast.error {
            border-left: 4px solid #FB923C;
            background: linear-gradient(90deg, rgba(251, 146, 60, 0.12), rgba(255, 255, 255, 0.95));
          }
          .toast.info {
            border-left: 4px solid #FFB347;
            background: linear-gradient(90deg, rgba(255, 179, 71, 0.08), rgba(255, 255, 255, 0.95));
          }
          .toast.warning {
            border-left: 4px solid #FB923C;
            background: linear-gradient(90deg, rgba(251, 146, 60, 0.15), rgba(255, 255, 255, 0.95));
          }
          
          /* ✅ 加载动画 */
          .loading-pulse {
            animation: loadingPulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
          }
          @keyframes loadingPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
          }
          
          /* ✅ 光感效果 */
          .glow-effect {
            position: relative;
          }
          .glow-effect::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, rgba(255, 179, 71, 0.4), rgba(255, 199, 120, 0.3), rgba(255, 179, 71, 0.4));
            background-size: 200% 200%;
            border-radius: inherit;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
            animation: glowRotate 3s ease-in-out infinite;
          }
          .glow-effect:hover::before {
            opacity: 1;
          }
          @keyframes glowRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
          }
          
          /* ✅ 月份切换动画 */
          .month-slide-enter {
            animation: monthSlideEnter 0.5s cubic-bezier(0.4, 0, 0.2, 1);
          }
          @keyframes monthSlideEnter {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
          }
      }
    </style>
  </head>

    <script id="calendar-script">
      document.addEventListener('DOMContentLoaded', function () {
        var monthDate = new Date();
        monthDate.setDate(1);

        var calendarState = {
          view: 'month',
          selectedDate: new Date()
        };

        var monthTitle = document.getElementById('month-title');
        var monthGrid = document.getElementById('month-grid');
        var weekGrid = document.getElementById('week-grid');
        var dayGrid = document.getElementById('day-grid');
        var weekTitle = document.querySelector('#week-view h2');
        var dayTitle = document.querySelector('#day-view h2');
        var detailPanel = document.getElementById('task-detail-panel');
        var closeDetailBtn = document.getElementById('close-detail-btn');
        var saveBtn = document.getElementById('save-btn');
        var detailTitle = document.getElementById('detail-title');
        var detailDescription = document.getElementById('detail-description');
        var detailDueAt = document.getElementById('detail-dueAt');
        var selectedTaskId = null;

        // ✅ Toast 提示函数 - 右上角弹出
        function showToast(message, type) {
          if (type === void 0) type = 'info';
          var toastContainer = document.getElementById('toast-container');
          if (!toastContainer) return;
          
          var toast = document.createElement('div');
          toast.className = 'toast ' + type;
          var iconClass = 'fa-info-circle';
          if (type === 'success') iconClass = 'fa-check-circle';
          else if (type === 'error') iconClass = 'fa-exclamation-circle';
          else if (type === 'warning') iconClass = 'fa-exclamation-triangle';
          
          toast.innerHTML = '<div class="flex items-center space-x-2"><i class="fas ' + iconClass + ' text-' + type + '"></i><span>' + message + '</span></div>';
          
          toastContainer.appendChild(toast);
          
          setTimeout(function() {
            toast.classList.add('show');
          }, 10);
          
          setTimeout(function() {
            toast.classList.remove('show');
            setTimeout(function() {
              if (toast.parentNode) toast.remove();
            }, 400);
          }, 3000);
        }

        function generateId(prefix) {
          return prefix + '_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        }

        function getDateKey(date) {
          var d = new Date(date);
          return [d.getFullYear(), (d.getMonth() + 1).toString().padStart(2, '0'), d.getDate().toString().padStart(2, '0')].join('-');
        }

        function formatMonthTitle(date) {
          return ''.concat(date.getFullYear(), '年', date.getMonth() + 1, '月');
        }

        function formatWeekRange(date) {
          var d = new Date(date);
          var day = d.getDay();
          var monday = new Date(d);
          monday.setDate(monday.getDate() - ((day + 6) % 7));
          var sunday = new Date(monday);
          sunday.setDate(monday.getDate() + 6);
          return ''.concat(monday.getFullYear(), '年', monday.getMonth() + 1, '月', monday.getDate(), '日 - ', sunday.getFullYear(), '年', sunday.getMonth() + 1, '月', sunday.getDate(), '日');
        }

        function formatDayTitle(date) {
          var d = new Date(date);
          var dayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
          return ''.concat(d.getFullYear(), '年', d.getMonth() + 1, '月', d.getDate(), '日 ', dayNames[d.getDay()]);
        }

        function getDayColor(task) {
          if (!task || !task.labels) return 'bg-primary';
          if (task.labels.includes('工作')) return 'bg-task-work';
          if (task.labels.includes('学习')) return 'bg-task-study';
          if (task.labels.includes('生活')) return 'bg-task-life';
          if (task.labels.includes('健康')) return 'bg-task-health';
          return 'bg-primary';
        }

        function formatDisplayDate(iso) {
          if (!iso) return '未设置日期';
          try {
            var d = new Date(iso);
            if (isNaN(d.getTime())) return '未设置日期';
            var opts = { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            return d.toLocaleString('zh-CN', opts).replace(/\//g, '-');
          } catch (e) { return '未设置日期'; }
        }

        function getTagClass(tag) {
          if (!tag) return 'tag-work';
          var t = String(tag).trim().toLowerCase();
          if (t === '工作' || t === 'work') return 'tag-work';
          if (t === '学习' || t === 'study') return 'tag-study';
          if (t === '生活' || t === 'life') return 'tag-life';
          if (t === '健康' || t === 'health') return 'tag-health';
          return 'bg-gray-100 text-gray-700';
        }

        function isSameDay(date1, date2) {
          return date1.getFullYear() === date2.getFullYear() &&
                 date1.getMonth() === date2.getMonth() &&
                 date1.getDate() === date2.getDate();
        }

        function renderScheduledTaskList() {
          var list = document.getElementById('scheduled-task-list');
          if (!list) return;
          var tasks = (AppState.tasks || []).filter(function (t) {
            return t.dueAt;
          }).sort(function (a, b) {
            return new Date(a.dueAt) - new Date(b.dueAt);
          }).slice(0, 10);

          if (tasks.length === 0) {
            list.innerHTML = '<div class="text-xs text-gray-500">暂无已排任务</div>';
            return;
          }

          list.innerHTML = '';
          tasks.forEach(function (task) {
            var item = document.createElement('div');
            item.className = 'p-2.5 rounded-xl border border-gray-200 hover:border-primary hover:bg-primary/5 cursor-pointer transition-all duration-300 scale-in';
            item.innerHTML = '<div class="flex justify-between items-center"><div class="text-sm font-medium text-gray-700">' + (task.title || '未命名任务') + '</div><div class="text-xs text-gray-500">' + formatDisplayDate(task.dueAt) + '</div></div><div class="text-xs mt-1"><span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ' + (task.labels && task.labels[0] ? getTagClass(task.labels[0]) : 'tag-work') + '"> ' + (task.labels && task.labels[0] ? task.labels[0] : '工作') + ' </span></div>';
            item.addEventListener('click', function () {
              var due = new Date(task.dueAt || new Date());
              monthDate = new Date(due.getFullYear(), due.getMonth(), 1);
              calendarState.selectedDate = due;
              switchToView('month');
              renderMonthGrid();
              showToast('已定位到 ' + getDateKey(due), 'success');
            });
            list.appendChild(item);
          });
        }

        function renderMonthGrid() {
          if (!monthGrid) return;
          monthGrid.innerHTML = '';

          var year = monthDate.getFullYear();
          var month = monthDate.getMonth();
          if (monthTitle) monthTitle.textContent = formatMonthTitle(monthDate);

          var first = new Date(year, month, 1);
          var firstWeekday = first.getDay();
          var startOffset = firstWeekday === 0 ? 6 : firstWeekday - 1;
          var startDate = new Date(year, month, 1 - startOffset);

          for (var i = 0; i < 42; i++) {
            var date = new Date(startDate);
            date.setDate(startDate.getDate() + i);
            var day = date.getDate();
            var isCurrentMonth = date.getMonth() === month;
            var dateKey = getDateKey(date);
            var dayTasks = AppState.tasks.filter(function (t) {
              return t.dueAt && getDateKey(t.dueAt) === dateKey;
            });

            var cell = document.createElement('div');
            cell.className = 'calendar-cell scale-in';
            if (!isCurrentMonth) {
              cell.classList.add('other-month');
            }
            if (isSameDay(date, new Date())) {
              cell.classList.add('today');
            }
            cell.dataset.date = dateKey;
            cell.innerHTML = "<div class='flex justify-between items-start'><span class='font-medium'>" + day + "</span></div>";

            var dotContainer = document.createElement('div');
            dotContainer.className = 'mt-1.5 flex flex-wrap gap-1.5';

            dayTasks.slice(0, 4).forEach(function (task) {
              var dot = document.createElement('span');
              dot.className = 'w-2.5 h-2.5 rounded-full shadow-sm ' + getDayColor(task) + ' cursor-pointer hover:scale-125 transition-transform duration-200';
              var timeStr = task.dueAt ? formatDisplayDate(task.dueAt) : '';
              var labels = (task.labels || []).join(', ');
              dot.title = (task.title || '') + (timeStr ? (' — ' + timeStr) : '') + (labels ? (' — ' + labels) : '');
              dot.dataset.taskId = task.id;
              dot.addEventListener('click', function (e) {
                e.stopPropagation();
                openTaskDetail(task);
                showToast('任务详情已打开', 'info');
              });
              dotContainer.appendChild(dot);
            });

            if (dayTasks.length > 4) {
              var more = document.createElement('span');
              more.className = 'text-xs text-gray-400';
              more.textContent = '+' + (dayTasks.length - 4);
              dotContainer.appendChild(more);
            }

            cell.appendChild(dotContainer);
            cell.addEventListener('dragover', function (e) {
              e.preventDefault();
            });
            cell.addEventListener('drop', function (e) {
              e.preventDefault();
              var taskId = e.dataTransfer.getData('task-id');
              if (!taskId) return;
              var task = AppState.tasks.find(function (t) {
                return t.id === taskId;
              });
              if (!task) return;
              task.dueAt = new Date(this.dataset.date + 'T00:00:00').toISOString();
              AppState.save();
              showToast('任务已安排到该日', 'success');
              renderMonthGrid();
            });
            cell.addEventListener('click', function () {
              var dateStr = this.dataset.date;
              var dayTasks2 = AppState.tasks.filter(function (t) {
                return t.dueAt && getDateKey(t.dueAt) === dateStr;
              });
              if (dayTasks2.length > 0) {
                openTaskDetail(dayTasks2[0]);
                showToast('已打开当日首个任务详情', 'info');
              }
            });

            monthGrid.appendChild(cell);
          }
        }

        function renderWeekView() {
          if (!weekGrid) return;
          weekGrid.innerHTML = '';
          
          if (weekTitle) {
            weekTitle.textContent = formatWeekRange(calendarState.selectedDate);
          }
          
          var d = new Date(calendarState.selectedDate);
          var day = d.getDay();
          var monday = new Date(d);
          monday.setDate(monday.getDate() - ((day + 6) % 7));
          
          for (var i = 0; i < 7; i++) {
            var date = new Date(monday);
            date.setDate(monday.getDate() + i);
            var dateKey = getDateKey(date);
            var dayTasks = AppState.tasks.filter(function (t) {
              return t.dueAt && getDateKey(t.dueAt) === dateKey;
            });
            
            var cell = document.createElement('div');
            cell.className = 'glass-card rounded-2xl p-3 text-center card-hover scale-in';
            if (isSameDay(date, new Date())) {
              cell.classList.add('ring-2', 'ring-primary/40');
            }
            
            var dayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            cell.innerHTML = '<div class="text-sm font-medium text-gray-500 mb-1.5">' + dayNames[date.getDay()] + '</div>' +
                           '<div class="text-lg font-bold text-gray-800 mb-2.5">' + date.getDate() + '</div>' +
                           '<div class="space-y-1.5"></div>';
            
            var taskContainer = cell.querySelector('.space-y-1.5');
            dayTasks.slice(0, 3).forEach(function (task) {
              var taskDiv = document.createElement('div');
              taskDiv.className = 'text-xs p-1.5 rounded-lg ' + getDayColor(task) + ' text-white truncate cursor-pointer hover:scale-105 transition-transform duration-200 shadow-sm';
              taskDiv.textContent = task.title || '未命名';
              taskDiv.title = task.title || '';
              taskDiv.addEventListener('click', function () {
                openTaskDetail(task);
              });
              taskContainer.appendChild(taskDiv);
            });
            
            weekGrid.appendChild(cell);
          }
        }

        function renderDayView() {
          if (!dayGrid) return;
          dayGrid.innerHTML = '';
          
          if (dayTitle) {
            dayTitle.textContent = formatDayTitle(calendarState.selectedDate);
          }
          
          var dateKey = getDateKey(calendarState.selectedDate);
          var dayTasks = AppState.tasks.filter(function (t) {
            return t.dueAt && getDateKey(t.dueAt) === dateKey;
          });
          
          var timeLabels = document.createElement('div');
          timeLabels.className = 'col-span-2 space-y-4';
          for (var hour = 8; hour <= 22; hour++) {
            var timeDiv = document.createElement('div');
            timeDiv.className = 'text-sm text-gray-500';
            timeDiv.textContent = hour + ':00';
            timeLabels.appendChild(timeDiv);
          }
          dayGrid.appendChild(timeLabels);
          
          var tasksContainer = document.createElement('div');
          tasksContainer.className = 'col-span-10 space-y-2';
          
          dayTasks.forEach(function (task) {
            var taskDiv = document.createElement('div');
            taskDiv.className = 'p-3 rounded-xl ' + getDayColor(task) + ' text-white card-hover cursor-pointer shadow-md';
            taskDiv.innerHTML = '<div class="font-medium">' + (task.title || '未命名任务') + '</div>' +
                              '<div class="text-xs mt-1 opacity-80">' + formatDisplayDate(task.dueAt) + '</div>';
            taskDiv.addEventListener('click', function () {
              openTaskDetail(task);
            });
            tasksContainer.appendChild(taskDiv);
          });
          
          dayGrid.appendChild(tasksContainer);
        }

        function openTaskDetail(task) {
          selectedTaskId = task.id;
          if (detailTitle) detailTitle.value = task.title || '';
          if (detailDescription) detailDescription.value = task.description || '';
          if (detailDueAt) {
            var d = task.dueAt ? new Date(task.dueAt) : new Date();
            detailDueAt.value = d.toISOString().slice(0, 16);
          }
          if (detailPanel) {
            detailPanel.classList.remove('hidden');
            detailPanel.classList.add('slide-in-right');
          }
        }

        function switchToView(view) {
          calendarState.view = view;
          document.querySelectorAll('.view-btn').forEach(function (b) {
            b.classList.remove('active', 'btn-primary');
            b.classList.add('btn-glass');
          });
          var activeBtn = document.querySelector('.view-btn[data-view="' + view + '"]');
          if (activeBtn) {
            activeBtn.classList.add('active', 'btn-primary');
            activeBtn.classList.remove('btn-glass');
          }
          document.querySelectorAll('.calendar-view').forEach(function (v) {
            v.classList.add('hidden');
          });
          var viewEl = document.getElementById(view + '-view');
          if (viewEl) {
            viewEl.classList.remove('hidden');
            viewEl.classList.add('fade-in');
          }
          if (view === 'week') {
            renderWeekView();
          } else if (view === 'day') {
            renderDayView();
          }
        }

        document.querySelectorAll('.view-btn').forEach(function (btn) {
          btn.addEventListener('click', function () {
            switchToView(btn.dataset.view);
          });
        });

        function updateCurrentDateLabel() {
          var now = new Date();
          var options = { month: 'long', day: 'numeric', weekday: 'long' };
          var currentDate = document.getElementById('current-date');
          if (currentDate) {
            currentDate.textContent = now.toLocaleDateString('zh-CN', options);
          }
        }

        updateCurrentDateLabel();

        var todayBtn = document.getElementById('today-btn');
        if (todayBtn) {
          todayBtn.addEventListener('click', function () {
            monthDate = new Date();
            monthDate.setDate(1);
            calendarState.selectedDate = new Date();
            switchToView('month');
            renderMonthGrid();
            showToast('已回到今天', 'success');
          });
        }

        var prevBtn = document.getElementById('month-prev-btn');
        var nextBtn = document.getElementById('month-next-btn');
        if (prevBtn) {
          prevBtn.addEventListener('click', function () {
            monthDate.setMonth(monthDate.getMonth() - 1);
            renderMonthGrid();
            showToast('已切换到上个月', 'info');
          });
        }
        if (nextBtn) {
          nextBtn.addEventListener('click', function () {
            monthDate.setMonth(monthDate.getMonth() + 1);
            renderMonthGrid();
            showToast('已切换到下个月', 'info');
          });
        }

        var weekPrevBtn = document.getElementById('week-prev-btn');
        var weekNextBtn = document.getElementById('week-next-btn');
        if (weekPrevBtn) {
          weekPrevBtn.addEventListener('click', function () {
            calendarState.selectedDate.setDate(calendarState.selectedDate.getDate() - 7);
            renderWeekView();
            showToast('已切换到上一周', 'info');
          });
        }
        if (weekNextBtn) {
          weekNextBtn.addEventListener('click', function () {
            calendarState.selectedDate.setDate(calendarState.selectedDate.getDate() + 7);
            renderWeekView();
            showToast('已切换到下一周', 'info');
          });
        }

        var dayPrevBtn = document.getElementById('day-prev-btn');
        var dayNextBtn = document.getElementById('day-next-btn');
        if (dayPrevBtn) {
          dayPrevBtn.addEventListener('click', function () {
            calendarState.selectedDate.setDate(calendarState.selectedDate.getDate() - 1);
            renderDayView();
            showToast('已切换到上一天', 'info');
          });
        }
        if (dayNextBtn) {
          dayNextBtn.addEventListener('click', function () {
            calendarState.selectedDate.setDate(calendarState.selectedDate.getDate() + 1);
            renderDayView();
            showToast('已切换到下一天', 'info');
          });
        }

        var scheduledRefresh = document.getElementById('refresh-scheduled-btn');
        if (scheduledRefresh) {
          scheduledRefresh.addEventListener('click', function() {
            renderScheduledTaskList();
            showToast('已刷新已排任务列表', 'success');
          });
        }


        // ✅ 批量完成按钮
        var batchCompleteBtn = document.getElementById('batch-complete-btn');
        if (batchCompleteBtn) {
          batchCompleteBtn.addEventListener('click', function () {
            var tasks = AppState.tasks || [];
            if (tasks.length === 0) {
              showToast('当前无任务', 'warning');
              return;
            }
            var count = 0;
            tasks.forEach(function (t) {
              if (t.status !== 'completed') {
                t.status = 'completed';
                count++;
              }
            });
            AppState.save();
            renderMonthGrid();
            showToast('已完成 ' + count + ' 个任务', 'success');
          });
        }

        // ✅ 批量删除按钮
        var batchDeleteBtn = document.getElementById('batch-delete-btn');
        if (batchDeleteBtn) {
          batchDeleteBtn.addEventListener('click', function () {
            var before = AppState.tasks.length;
            AppState.tasks = (AppState.tasks || []).filter(function (t) {
              return t.status !== 'completed';
            });
            var after = AppState.tasks.length;
            AppState.save();
            renderMonthGrid();
            showToast('已删除 ' + (before - after) + ' 个已完成任务', 'success');
          });
        }

        // ✅ 排序下拉列表 - 修复层级问题
        var sortFilterBtn = document.getElementById('sort-filter-btn');
        var sortFilterMenu = document.getElementById('sort-filter-menu');
        var sortFilterArrow = document.getElementById('sort-filter-arrow');
        var sortFilterContainer = sortFilterBtn ? sortFilterBtn.parentElement : null;

        if (sortFilterBtn && sortFilterMenu) {
          sortFilterBtn.addEventListener('click', function (e) {
            e.stopPropagation();
            e.preventDefault();
            
            // 关闭其他下拉菜单
            var otherMenus = document.querySelectorAll('.dropdown-menu');
            otherMenus.forEach(function(menu) {
              if (menu !== sortFilterMenu) {
                menu.classList.remove('show');
              }
            });
            
            sortFilterMenu.classList.toggle('show');
            if (sortFilterArrow) {
              sortFilterArrow.style.transform = sortFilterMenu.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0deg)';
            }
          });

          sortFilterMenu.querySelectorAll('.dropdown-item').forEach(function (item) {
            item.addEventListener('click', function (e) {
              e.stopPropagation();
              e.preventDefault();
              var sortType = this.dataset.sort;
              if (sortType === 'time') {
                AppState.tasks.sort(function (a, b) {
                  if (!a.dueAt) return 1;
                  if (!b.dueAt) return -1;
                  return new Date(a.dueAt) - new Date(b.dueAt);
                });
                showToast('已按时间排序', 'success');

              } else if (sortType === 'priority') {
                var order = { high: 1, medium: 2, low: 3 };
                AppState.tasks.sort(function (a, b) {
                  return (order[a.priority] || 4) - (order[b.priority] || 4);
                });
                showToast('已按优先级排序', 'success');
              } else if (sortType === 'label') {
                AppState.tasks.sort(function (a, b) {
                  var la = (a.labels || [])[0] || '';
                  var lb = (b.labels || [])[0] || '';
                  return la.localeCompare(lb);
                });
                showToast('已按标签排序', 'success');
              }
              AppState.save();
              sortFilterMenu.classList.remove('show');
              if (sortFilterArrow) {
                sortFilterArrow.style.transform = 'rotate(0deg)';
              }
              renderMonthGrid();
            });
          });

          document.addEventListener('click', function (e) {
            if (!sortFilterContainer || !sortFilterContainer.contains(e.target)) {
              sortFilterMenu.classList.remove('show');
              if (sortFilterArrow) {
                sortFilterArrow.style.transform = 'rotate(0deg)';
              }
            }
          });
        }

        // ✅ 用户菜单下拉 - 修复黑色边框
        var userMenuBtn = document.getElementById('user-menu-btn');
        var userDropdown = document.getElementById('user-dropdown');
        var userMenuContainer = document.getElementById('user-menu-container');

        if (userMenuBtn && userDropdown) {
          userMenuBtn.addEventListener('click', function (e) {
            e.stopPropagation();
            e.preventDefault();
            userDropdown.classList.toggle('show');
          });

          document.addEventListener('click', function (e) {
            if (!userMenuContainer || !userMenuContainer.contains(e.target)) {
              userDropdown.classList.remove('show');
            }
          });
        }

        if (closeDetailBtn) {
          closeDetailBtn.addEventListener('click', function () {
            detailPanel.classList.add('hidden');
          });
        }

        if (saveBtn) {
          saveBtn.addEventListener('click', function () {
            if (!selectedTaskId) {
              showToast('未选择任务', 'warning');
              return;
            }

            var task = (AppState.tasks || []).find(function (t) {
              return String(t.id) === String(selectedTaskId);
            });
            if (!task) {
              showToast('任务不存在或已删除', 'error');
              return;
            }

            var payload = {
              title: detailTitle ? detailTitle.value.trim() : task.title,
              description: detailDescription ? detailDescription.value.trim() : task.description,
              dueAt: detailDueAt && detailDueAt.value ? new Date(detailDueAt.value).toISOString() : null
            };

            apiRequest('/api/tasks/' + selectedTaskId, {
              method: 'PUT',
              body: JSON.stringify(payload)
            }).then(function (resp) {
              if (resp && resp.status === 200 && resp.body && resp.body.code === 200 && resp.body.data) {
                var updated = resp.body.data;
                task.title = updated.title || payload.title || task.title;
                task.description = updated.description || payload.description || task.description;
                task.dueAt = updated.dueAt || payload.dueAt;
                AppState.save();
                renderMonthGrid();
                renderScheduledTaskList();
                renderWeekView();
                renderDayView();
                if (detailPanel) detailPanel.classList.add('hidden');
                showToast('任务已保存', 'success');
              } else {
                showToast((resp && resp.body && resp.body.message) || '保存失败', 'error');
              }
            }).catch(function () {
              showToast('网络错误，保存失败', 'error');
            });
          });
        }

        window.renderMonthGrid = renderMonthGrid;
        
        // ✅ 从后端加载任务
        function parseTags(tags) {
          if (!tags && tags !== '') return [];
          if (Array.isArray(tags)) return tags.map(String).map(function(s){ return s.trim(); }).filter(Boolean);
          if (typeof tags === 'object' && tags !== null) {
            try {
              return Object.values(tags).map(String).map(function(s){ return s.trim(); }).filter(Boolean);
            } catch (e) { return []; }
          }
          if (typeof tags === 'string') {
            var raw = tags.trim();
            if (raw === '') return [];
            try {
              var parsed = JSON.parse(raw);
              if (Array.isArray(parsed)) return parsed.map(String).map(function(s){ return s.trim(); }).filter(Boolean);
              if (typeof parsed === 'object' && parsed !== null) return Object.values(parsed).map(String).map(function(s){ return s.trim(); }).filter(Boolean);
            } catch (e) {}
            return raw.split(/[;,|]/).map(function(s){ return s.trim(); }).filter(Boolean);
          }
          return [];
        }

        apiRequest('/api/tasks').then(function(res) {
          if (res && (res.status === 200 || res.status === 0) && res.body && res.body.data) {
            try {
              var serverTasks = res.body.data;

              function parseDateVal(v) {
                if (v === null || v === undefined || v === '') return null;
                if (typeof v === 'number') {
                  var dnum = new Date(v);
                  return isNaN(dnum.getTime()) ? null : dnum.toISOString();
                }
                if (typeof v === 'string') {
                  var s = v.trim();
                  if (s === '') return null;
                  var d = new Date(s);
                  if (!isNaN(d.getTime())) return d.toISOString();
                  var n = parseInt(s, 10);
                  if (!isNaN(n)) {
                    d = new Date(n);
                    if (!isNaN(d.getTime())) return d.toISOString();
                    d = new Date(n * 1000);
                    if (!isNaN(d.getTime())) return d.toISOString();
                  }
                }
                return null;
              }

              function normalizeTagsField(t) {
                var raw = null;
                if (!t) return [];
                raw = t.tags || t.tag || t.labels || t.tagNames || t.tagsString || '';
                return parseTags(raw);
              }

              AppState.tasks = (serverTasks || []).map(function(t){
                return {
                  id: String(t.id || t.taskId || ''),
                  title: t.title || t.name || '',
                  description: t.description || t.note || '',
                  dueAt: parseDateVal(t.dueAt || t.dueAtStr || t.due_at || t.dueTime || t.startTime || t.startedAt),
                  status: t.status || t.state || 'pending',
                  priority: t.priority || 'medium',
                  labels: normalizeTagsField(t),
                  estimate: t.pomodoroPlan || t.estimate || t.estimatedPomodoros || 0,
                  createdAt: parseDateVal(t.createdAt || t.created_at),
                  updatedAt: parseDateVal(t.updatedAt || t.updated_at)
                };
              });
              AppState.save && AppState.save();
            } catch (e) {
              console.warn('任务解析失败', e);
            }
          }
        }).catch(function(){ /* ignore network errors */ }).finally(function(){
          renderMonthGrid();
          renderScheduledTaskList();
          renderWeekView();
          renderDayView();
        });
      });
    </script>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        AppState.init();
        renderHeader('calendar');
        renderFooter('calendar');
        bindGlobalLogout();

        function performLogout() {
          AppState.logout();
          showToast('已退出登录', 'success');
          setTimeout(function () {
            window.location.href = '登录页面.html';
          }, 300);
        }
        window.performLogout = performLogout;
        
        // 绑定顶部退出登录按钮
        var logoutBtnTop = document.getElementById('logout-btn-top');
        if (logoutBtnTop) {
          logoutBtnTop.addEventListener('click', function (e) {
            e.preventDefault();
            performLogout();
          });
        }
        
        // ✅ 处理添加任务按钮 - 跳转到待办页面并打开模态框
        var addTaskBtn = document.getElementById('add-task-btn');
        if (addTaskBtn) {
          addTaskBtn.addEventListener('click', function (e) {
            e.preventDefault();
            window.location.href = '待办页面.html?openModal=new-task';
          });
        }
      });
    </script>
