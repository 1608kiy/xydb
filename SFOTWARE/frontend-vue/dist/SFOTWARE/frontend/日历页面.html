      /* 快速导航遮罩：在用户开始触摸或按下底部导航时遮盖旧内容，减少页面切换闪烁 */
      .nav-transition-overlay::before {
        content: "";
        position: fixed;
        left: 0;
        top: 0;
        right: 0;
        bottom: 0;
        background: rgba(255,255,255,0.94);
        z-index: 99999;
        pointer-events: none;
      }
      /* ================================================ */
      /* 日历页完整交互动画规范 (150-300ms, 无阻塞) */
      /* ================================================ */
      /* 【1】月份切换淡出上移 (250ms) */
      .calendar-month-view.month-exit {
        animation: monthExit 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      }
      @keyframes monthExit {
        0% { opacity: 1; transform: translateX(0); }
        100% { opacity: 0; transform: translateX(-30px); }
      }
      /* 【2】月份进入淡入下移 (250ms) */
      .calendar-month-view.month-enter {
        animation: monthEnter 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      @keyframes monthEnter {
        from { opacity: 0; transform: translateX(30px); }
        to { opacity: 1; transform: translateX(0); }
      }
      /* 【3】日期点击放大 (150ms) */
      .calendar-date.date-tap {
        animation: dateTap 0.15s ease-out both;
      }
      @keyframes dateTap {
        0% { transform: scale(0.95); }
        100% { transform: scale(1.08); }
      }
      /* 【4】任务列表淡出上移 (200ms) */
      .task-list.task-list-exit {
        animation: taskListExit 0.2s ease-in forwards;
      }
      @keyframes taskListExit {
        from { opacity: 1; transform: translateY(0); }
        to { opacity: 0; transform: translateY(-10px); }
      }
      /* 【5】任务列表淡入下移 (200ms) */
      .task-list.task-list-enter {
        animation: taskListEnter 0.2s ease-out both;
      }
      @keyframes taskListEnter {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      /* 【6】任务标记小点弹性出现 (180ms) */
      .date-dot.dot-appear {
        animation: dotAppear 0.18s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      @keyframes dotAppear {
        from { transform: scale(0); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      /* 【7】视图切换交叉淡入淡出 (200ms) */
      .view-content.view-fade-out {
        animation: viewFadeOut 0.2s ease-in forwards;
      }
      @keyframes viewFadeOut {
        from { opacity: 1; }
        to { opacity: 0; }
      }
      .view-content.view-fade-in {
        animation: viewFadeIn 0.2s ease-out both;
      }
      @keyframes viewFadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      /* 信息架构优化：主路径聚焦 */
      .calendar-secondary-shell { border: 1px solid rgba(226,232,240,0.7); border-radius: 16px; background: rgba(255,255,255,0.62); }
      .calendar-secondary-header { min-height: 44px; }
      .calendar-secondary-body.hidden { display: none; }
      .calendar-task-stream { border: 1px solid rgba(226,232,240,0.9); border-radius: 16px; background: rgba(255,255,255,0.75); }
      .calendar-task-item { border: 1px solid rgba(226,232,240,0.9); border-radius: 12px; background: rgba(255,255,255,0.92); }
      .calendar-task-item.done { opacity: 0.62; }
      .calendar-empty { border: 1px dashed rgba(99,102,241,0.35); border-radius: 14px; background: rgba(99,102,241,0.06); min-height: 104px; }
      .calendar-empty-cta { min-height: 44px; }
      .calendar-cell.has-all-completed { background: rgba(148,163,184,0.12); }
      .calendar-cell .task-count-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 18px;
        height: 18px;
        border-radius: 999px;
        font-size: 11px;
        line-height: 1;
        background: rgba(239,68,68,0.15);
        color: #dc2626;
        padding: 0 6px;
      }
      .calendar-cell.selected-date-cell { transform: scale(1.03); border-color: rgba(79,70,229,0.45); box-shadow: 0 10px 20px rgba(79,70,229,0.12); }
      #calendar-main {
        padding-bottom: calc(148px + env(safe-area-inset-bottom, 0px));
      }
      @media (max-width: 900px) {
        #today-btn, #batch-complete-btn, #batch-delete-btn, #sort-filter-btn { display: none !important; }
        #calendar-main {
          padding-bottom: calc(188px + env(safe-area-inset-bottom, 0px));
        }
      }
    </style>

    <script>
      (function(){
        function addNavTouchHandlers(){
          var tabs = document.querySelectorAll('footer .tab-item[href]');
          if(!tabs || !tabs.length) return;
          tabs.forEach(function(tab){
            tab.addEventListener('touchstart', function(){ document.documentElement.classList.add('nav-transition-overlay'); }, {passive:true});
            tab.addEventListener('mousedown', function(){ document.documentElement.classList.add('nav-transition-overlay'); });
          });
          window.addEventListener('pageshow', function(){ document.documentElement.classList.remove('nav-transition-overlay'); });
          window.addEventListener('pagehide', function(){ document.documentElement.classList.remove('nav-transition-overlay'); });
        }
        if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', addNavTouchHandlers); else addNavTouchHandlers();
      })();
    </script>
    <script>
      window.navWithOverlay = function (url, ev) {
        try { ev && ev.preventDefault && ev.preventDefault(); } catch (e) {}
        try { document.documentElement.classList.add('nav-transition-overlay'); } catch (e) {}
        requestAnimationFrame(function () {
          requestAnimationFrame(function () { window.location.href = url; });
        });
        return false;
      };
    </script>
    <script>
      // Lightweight PJAX to reduce flicker on footer navigation
      (function (){
        if (window.__pjax_installed) return; window.__pjax_installed = true;
        window.__pjax_cache = window.__pjax_cache || {};
        function absHref(src){ try { return new URL(src, location.href).href; } catch(e){ return src; } }
        async function loadPage(url){
          try{
            document.documentElement.classList.add('nav-transition-overlay');
            let text;
            if (window.__pjax_cache && window.__pjax_cache[url]) {
              text = window.__pjax_cache[url];
            } else {
              const res = await fetch(url, { credentials: 'same-origin', cache: 'no-cache' });
              if (!res.ok) { window.location.href = url; return; }
              text = await res.text();
              try { window.__pjax_cache[url] = text; } catch (e) {}
            }
            const parser = new DOMParser();
            const doc = parser.parseFromString(text, 'text/html');
            const newMain = doc.querySelector('main');
            const curMain = document.querySelector('main');
            if (!newMain || !curMain) { window.location.href = url; return; }
            curMain.innerHTML = newMain.innerHTML;
            const newFooter = doc.querySelector('footer');
            const curFooter = document.querySelector('footer');
            if (newFooter && curFooter) curFooter.innerHTML = newFooter.innerHTML;
            if (doc.title) document.title = doc.title;
            const fetchedScripts = Array.from(doc.querySelectorAll('script'));
            for (const s of fetchedScripts) {
              if (s.src) {
                const src = absHref(s.src);
                if (Array.from(document.scripts).some(x=>absHref(x.src)===src)) continue;
                await new Promise((resolve)=>{
                  const sc = document.createElement('script'); sc.src = src; sc.async = false; sc.onload = sc.onerror = resolve; document.body.appendChild(sc);
                });
              } else if (s.textContent && s.textContent.trim()) {
                const sc = document.createElement('script'); sc.text = s.textContent; document.body.appendChild(sc);
              }
            }
            history.pushState({pjax: true, url: url}, '', url);
          } catch (err) {
            console.error('PJAX failed, fallback', err);
            window.location.href = url;
          } finally {
            document.documentElement.classList.remove('nav-transition-overlay');
          }
        }

        function prefetchFooterPages(){
          try {
            const links = Array.from(document.querySelectorAll('footer .tab-item[href]'));
            links.forEach(function(a){
              const href = a.getAttribute('href');
              if (!href) return;
              const abs = absHref(href);
              if (abs === location.href || window.__pjax_cache[abs]) return;
              fetch(abs, {credentials:'same-origin', cache:'no-cache'}).then(function(res){
                if (!res.ok) return null;
                return res.text();
              }).then(function(txt){ if (txt) window.__pjax_cache[abs] = txt; }).catch(()=>{});
            });
          } catch (e) {}
        }

        if ('requestIdleCallback' in window) requestIdleCallback(prefetchFooterPages, {timeout:2000}); else setTimeout(prefetchFooterPages, 1500);

        document.addEventListener('click', function(ev){ const a = ev.target.closest && ev.target.closest('a.tab-item[href]'); if (!a) return; const href = a.getAttribute('href'); if (!href) return; if (href.indexOf('http')===0 && new URL(href).origin !== location.origin) return; ev.preventDefault(); loadPage(href); });
        window.addEventListener('popstate', function(ev){ const url = (ev.state && ev.state.url) || location.pathname; if (url) loadPage(url); });
      })();
    </script>

            <i class="fas fa-chevron-down text-xs text-gray-500"></i>
          </button>
          <div id="secondary-pool-body" class="calendar-secondary-body px-4 pb-4 hidden">
            <div class="space-y-3" id="task-pool"></div>
            <button type="button" id="ai-schedule-btn" class="mt-3 btn-glass w-full justify-center text-sm">
              <i class="fas fa-magic mr-2"></i>AI 智能排程
            </button>
            <p id="ai-schedule-status" class="mt-2 text-xs text-gray-500">AI 为待办池任务提供建议时间</p>
          </div>
        </section>

        <div aria-hidden="true" class="h-20 md:h-14"></div>
      </main>
      <!-- [/MODULE] e3f_主内容区域 -->
      
    </div>

    <!-- [MODULE] k6l_任务详情/编辑区 -->
    <div id="task-detail-panel" class="modal-overlay hidden">
      <div class="modal-content task-detail-scrollbar-hide">
        <div class="flex justify-between items-center mb-5">
          <h2 class="text-xl font-bold text-gray-800">
            <i class="fas fa-clipboard-list text-primary mr-2"></i>任务详情
          </h2>
          <button class="icon-soft-danger" id="close-detail-btn">

        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">任务标题</label>
            <input id="detail-title" class="glass-input w-full px-4 py-2.5 rounded-xl focus:outline-none transition-all" type="text" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">描述</label>
            <textarea id="detail-description" class="glass-input w-full px-4 py-2.5 rounded-xl focus:outline-none transition-all resize-none" placeholder="添加描述..." rows="3"></textarea>
          </div>

          <div class="task-detail-section">
            <label class="block text-sm font-medium text-gray-700 mb-1.5">截止日期和时间</label>
            <div class="detail-datetime-shell" id="detail-datetime-shell">
              <button type="button" class="detail-datetime-trigger" id="detail-datetime-trigger">
                <span id="detail-datetime-text">未设置截止时间</span>
                <i class="fas fa-chevron-down text-xs text-gray-500"></i>
              </button>
              <div class="detail-datetime-panel" id="detail-datetime-panel">
                <div class="detail-datetime-grid">
                  <div class="datetime-select-shell" id="detail-date-shell">
                    <button type="button" class="datetime-select-trigger" id="detail-date-trigger">
                      <span id="detail-date-text">选择日期</span>
                      <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="datetime-select-menu dropdown-menu" id="detail-date-menu"></div>
                    <input class="hidden" id="detail-date-input" type="date" />
                  </div>
                  <div class="datetime-select-shell" id="detail-time-shell">
                    <button type="button" class="datetime-select-trigger" id="detail-time-trigger">
                      <span id="detail-time-text">选择时间</span>
                      <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="datetime-select-menu dropdown-menu" id="detail-time-menu"></div>
                    <input class="hidden" id="detail-time-input" type="time" />
                  </div>
                </div>
                <div class="datetime-quick-actions">
                  <button type="button" class="datetime-quick-btn" id="detail-datetime-today">今天</button>
                  <button type="button" class="datetime-quick-btn" id="detail-datetime-tomorrow">明天</button>
                  <button type="button" class="datetime-quick-btn" id="detail-datetime-clear">清空</button>
                </div>
              </div>
            </div>
            <input id="detail-dueAt" class="hidden" type="datetime-local" />
          </div>

          <div class="task-detail-section">
            <div class="flex justify-between items-center mb-2.5">
              <label class="block text-sm font-medium text-gray-700">子任务</label>
              <div class="flex items-center gap-2">
                <button class="text-xs text-primary hover:text-secondary transition-colors" id="copy-subtasks-btn">
                  <i class="fas fa-copy mr-1"></i>复制
                </button>
                <button class="text-xs text-primary hover:text-secondary transition-colors" id="share-subtasks-btn">
                  <i class="fas fa-share-alt mr-1"></i>分享
                </button>
                <button class="text-xs text-primary hover:text-secondary transition-colors" id="complete-all-subtasks">
                  <i class="fas fa-check-square mr-1"></i>全部完成
                </button>
              </div>
            </div>
            <div class="space-y-2 mb-3 max-h-40 overflow-y-auto task-detail-scrollbar-hide" id="subtask-list"></div>
            <div class="subtask-compose">
              <input id="new-subtask-input" class="subtask-compose-input" placeholder="添加子任务..." type="text" maxlength="60" />
              <button id="add-subtask-btn" class="subtask-compose-btn" type="button">
                <i class="fas fa-plus"></i>
              </button>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">标签</label>
            <div class="flex flex-wrap gap-2 mb-2.5" id="tag-list"></div>
          </div>
          <button class="w-full py-2.5 btn-glass text-primary inline-flex items-center justify-center gap-2 text-sm" id="auto-plan-task-btn" type="button">
            <i class="fas fa-sitemap"></i><span>智能分类并拆解并行子任务</span>
          </button>

          <div class="flex space-x-3 pt-4 border-t border-gray-200">
            <button class="flex-1 py-2.5 btn-soft-danger rounded-xl text-sm font-medium" id="cancel-btn">取消</button>
            <button class="flex-1 py-2.5 btn-primary rounded-xl text-sm font-medium" id="save-btn">保存任务</button>
          </div>
          <div class="grid grid-cols-3 gap-2 pt-1">
            <button class="min-w-[80px] py-2.5 btn-glass text-primary inline-flex items-center justify-center gap-1.5 text-xs" id="share-task-btn">
              <i class="fas fa-share-alt text-sm"></i><span>分享</span>
            </button>
            <button class="min-w-[80px] py-2.5 btn-glass inline-flex items-center justify-center gap-1.5 text-xs" id="copy-task-btn">
              <i class="fas fa-copy text-sm"></i><span>复制</span>
            </button>
            <button class="min-w-[80px] py-2.5 btn-glass text-danger inline-flex items-center justify-center gap-1.5 text-xs" id="delete-task-btn">
              <i class="fas fa-trash-alt text-sm"></i><span>删除</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- [/MODULE] k6l_任务详情/编辑区 -->

        </a>
        <a

        <a

            <i class="fas fa-check-circle text-base"></i>
          </div>
          <span class="text-[10px] mt-1 font-semibold text-gray-700">打卡</span>
          <span class="tab-indicator"></span>
        </a>
        <a
          class="tab-item flex flex-col items-center text-gray-500 hover:text-primary px-2 py-1.5 rounded-2xl transition-all duration-300"
